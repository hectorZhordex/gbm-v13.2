            <p className="text-sm font-medium">No sales found for the selected period</p>
            <p className="text-xs mt-1">Try changing the date range or period filter</p>
          </div>
        ) : (
          <table className="w-full">
            <thead>
              <tr className="text-xs text-gray-500 bg-gray-50">
                {['Invoice #','Customer','Items','Note','Tracking #','Method','Amount','Date','Time','Status','Actions'].map(h=>(
                  <th key={h} className="text-left px-4 py-3 font-medium">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filteredOrders.map((o,i)=>(
                <tr key={i} className="table-row border-t border-gray-50">
                  <td className="px-4 py-3 text-sm font-mono font-medium text-indigo-600">{o.id}</td>
                  <td className="px-4 py-3 text-sm font-medium text-gray-800">{o.customer}<div className="text-xs text-gray-400">{o.phone}</div></td>
                  <td className="px-4 py-3 text-xs text-gray-500 max-w-36 truncate">{o.items}</td>
                  <td className="px-4 py-3 text-xs text-amber-700 italic max-w-28 truncate">{o.note || <span className="text-gray-300">—</span>}</td>
                  <td className="px-4 py-3 min-w-40">
                    {editTrack && editTrack.orderId===o.id ? (
                      <div className="flex items-center gap-1">
                        <input autoFocus value={editTrack.draft}
                          onChange={e=>setEditTrack(t=>({...t,draft:e.target.value}))}
                          onKeyDown={e=>{ if(e.key==='Enter') saveTracking(o.id,editTrack.draft); if(e.key==='Escape') setEditTrack(null); }}
                          placeholder="e.g. MC26173229"
                          className="w-32 border border-blue-300 rounded-lg px-2 py-1 text-xs font-mono text-blue-700 focus:ring-1 focus:ring-blue-400 bg-white" />
                        <button onClick={()=>saveTracking(o.id,editTrack.draft)} className="text-emerald-600 hover:text-emerald-700 font-bold text-base px-1" title="Save">✓</button>
                        <button onClick={()=>setEditTrack(null)} className="text-gray-400 hover:text-gray-600 text-base px-0.5" title="Cancel">✕</button>
                      </div>
                    ) : (
                      <div className="flex items-center gap-1.5 group cursor-pointer" onClick={()=>setEditTrack({orderId:o.id,draft:o.tracking||''})}>
                        <span className={`text-xs font-mono ${o.tracking?'text-blue-700':'text-gray-300'}`}>{o.tracking||'— add'}</span>
                        <span className="opacity-0 group-hover:opacity-100 text-blue-400 text-xs transition-opacity" title="Click to edit">✏️</span>
                      </div>
                    )}
                  </td>
                  <td className="px-4 py-3"><span className={`text-xs px-2 py-1 rounded-full font-medium ${o.method==='Cash'?'bg-emerald-100 text-emerald-700':o.method==='Card'?'bg-blue-100 text-blue-700':'bg-purple-100 text-purple-700'}`}>{o.method}</span></td>
                  <td className="px-4 py-3 text-sm font-bold text-gray-800">LKR {o.amount.toFixed(2)}</td>
                  <td className="px-4 py-3 text-xs text-gray-500">{o.date}</td>
                  <td className="px-4 py-3 text-xs text-gray-500">{o.time || <span className="text-gray-300">—</span>}</td>
                  <td className="px-4 py-3"><span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-medium">{o.status}</span></td>
                  <td className="px-4 py-3">
                    <button onClick={()=>setDeleteConfirm(o)}
                      className="text-xs bg-red-50 text-red-600 border border-red-200 px-2.5 py-1.5 rounded-lg hover:bg-red-100 font-medium"
                      title="Delete order">
                      🗑️ Delete
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="border-t-2 border-gray-200 bg-indigo-50">
                <td colSpan="6" className="px-4 py-3 text-sm font-bold text-gray-700">Total ({filteredOrders.length} orders)</td>
                <td className="px-4 py-3 text-sm font-bold text-indigo-600">LKR {totalSales.toFixed(2)}</td>
                <td colSpan="4"></td>
              </tr>
            </tfoot>
          </table>
        )}
      </div>

      {/* P&L */}
      <div className="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-6 mt-5 text-white">
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-lg">Profit & Loss — {periodLabel}</h3>
          <button onClick={handlePDFExport} className="text-xs bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg font-medium">📄 Print P&L</button>
        </div>
        <div className="grid grid-cols-3 gap-6">
          {[['Revenue',`LKR ${totalSales.toFixed(2)}`],['Expenses & COGS',`LKR ${(totalSales*0.67).toFixed(2)}`],['Net Profit',`LKR ${netProfit.toFixed(2)}`]].map(([l,v],i)=>(
            <div key={i}>
              <div className="text-sm opacity-70 mb-1">{l}</div>
              <div className="text-2xl font-bold">{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Delete Order Confirmation Modal */}
      {deleteConfirm && (
        <div className="modal-overlay" onClick={()=>setDeleteConfirm(null)}>
          <div className="modal-box-sm" onClick={e=>e.stopPropagation()}>
            <div className="text-center mb-5">
              <div className="text-5xl mb-3">⚠️</div>
              <h2 className="text-xl font-bold text-gray-800 mb-2">Delete Order?</h2>
              <p className="text-gray-500 text-sm">Are you sure you want to delete this order?</p>
            </div>
            <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-5 space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-gray-600">Order #:</span><span className="font-mono font-semibold text-indigo-600">{deleteConfirm.id}</span></div>
              <div className="flex justify-between"><span className="text-gray-600">Customer:</span><span className="font-semibold">{deleteConfirm.customer}</span></div>
              <div className="flex justify-between"><span className="text-gray-600">Amount:</span><span className="font-bold text-gray-800">LKR {deleteConfirm.amount.toFixed(2)}</span></div>
              <div className="flex justify-between"><span className="text-gray-600">Date:</span><span>{deleteConfirm.date} {deleteConfirm.time && `· ${deleteConfirm.time}`}</span></div>
            </div>
            <div className="bg-red-50 border border-red-200 rounded-xl p-3 mb-5">
              <p className="text-xs text-red-700 font-medium text-center">This action cannot be undone. The order will be permanently removed.</p>
            </div>
            <div className="flex gap-3">
              <button onClick={()=>setDeleteConfirm(null)}
                className="flex-1 border border-gray-200 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50">
                Cancel
              </button>
              <button onClick={()=>handleDeleteOrder(deleteConfirm)}
                className="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-medium hover:bg-red-700">
                Yes, Delete Order
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function Settings({ showToast, settings, setSettings, adminPassword, setAdminPassword,
                    customers, setCustomers, orders, setOrders, products, setProducts,
                    packages, setPackages,
                    lastInvoiceNumber, setLastInvoiceNumber,
                    trackingCounter, setTrackingCounter }) {
  const [form, setForm] = useState({...settings});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const [pwForm, setPwForm] = useState({ current:'', newPw:'', confirm:'' });
  const setPw=(k,v)=>setPwForm(f=>({...f,[k]:v}));
  const [importConfirm, setImportConfirm] = useState(null);
  const importRef = useRef(null);

  // Numbering state (local drafts, applied on Save)
  const [startInvoiceDraft, setStartInvoiceDraft] = useState('');
  const [startTrackingDraft, setStartTrackingDraft] = useState('');
  const [resetConfirm, setResetConfirm] = useState(false);

  const handleSave=()=>{
    setSettings({...form, tax: parseFloat(form.tax)||8});
    showToast('Settings saved & applied in real-time!');
  };

  const handleChangePassword=()=>{
    if (!pwForm.current) { showToast('Enter current password'); return; }
    if (pwForm.current !== adminPassword) { showToast('Current password is incorrect'); return; }
    if (pwForm.newPw.length < 6) { showToast('New password must be at least 6 characters'); return; }
    if (pwForm.newPw !== pwForm.confirm) { showToast('Passwords do not match'); return; }
    setAdminPassword(pwForm.newPw);
    setPwForm({ current:'', newPw:'', confirm:'' });
    showToast('Password updated successfully!');
  };

  // ── NUMBERING HANDLERS ─────────────────────────────────────────────────────
  const handleSetStartInvoice = () => {
    const n = parseInt(startInvoiceDraft, 10);
    if (isNaN(n) || n < 1) { showToast('Enter a valid invoice number (e.g. 2345)'); return; }
    // Store n-1 so next invoice will be n
    setLastInvoiceNumber(n - 1);
    setStartInvoiceDraft('');
    showToast(`Next invoice will be: ${String(n).padStart(4,'0')}`);
  };

  const handleSetStartTracking = () => {
    const val = startTrackingDraft.trim();
    if (!val) { showToast('Enter a tracking number (e.g. MC97686264)'); return; }
    // Extract the numeric part only from the entered value (e.g. "MC97686264" → 97686264)
    const numPart = parseInt(val.replace(/^[A-Za-z]*/, ''), 10);
    if (isNaN(numPart) || numPart < 1) { showToast('Invalid tracking number — include digits (e.g. MC97686264)'); return; }
    setTrackingCounter(numPart);
    setStartTrackingDraft('');
    showToast(`Tracking set — next order: MC${numPart}`);
  };

  const handleResetCounters = () => {
    setLastInvoiceNumber(0);
    setTrackingCounter(0);
    setResetConfirm(false);
    showToast('Invoice and tracking counters reset to zero.');
  };

  // ── EXPORT BACKUP ──────────────────────────────────────────────────────────
  const handleExportBackup = () => {
    try {
      // Safely read all data from localStorage with proper fallbacks
      let safeCustomers = [];
      let safeOrders = [];
      let safeProducts = [];
      let safePackages = [];
      let safeTasks = [];
      let safeSettings = {};
      let safeLastInvoiceNumber = 0;
      let safeTrackingCounter = 0;
      let safeAdminPassword = 'thegreatadmin';

      try {
        const customersData = localStorage.getItem('gbm_customers');
        safeCustomers = customersData ? JSON.parse(customersData) : [];
      } catch (e) {
        console.warn('Failed to read customers from localStorage:', e);
        safeCustomers = [];
      }

      try {
        const ordersData = localStorage.getItem('gbm_orders');
        safeOrders = ordersData ? JSON.parse(ordersData) : [];
      } catch (e) {
        console.warn('Failed to read orders from localStorage:', e);
        safeOrders = [];
      }

      try {
        const productsData = localStorage.getItem('gbm_products');
        safeProducts = productsData ? JSON.parse(productsData) : [];
      } catch (e) {
        console.warn('Failed to read products from localStorage:', e);
        safeProducts = [];
      }

      try {
        const packagesData = localStorage.getItem('gbm_packages');
        safePackages = packagesData ? JSON.parse(packagesData) : [];
      } catch (e) {
        console.warn('Failed to read packages from localStorage:', e);
        safePackages = [];
      }

      try {
        const tasksData = localStorage.getItem('gbm_tasks');
        safeTasks = tasksData ? JSON.parse(tasksData) : [];
      } catch (e) {
        console.warn('Failed to read tasks from localStorage:', e);
        safeTasks = [];
      }

      try {
        const settingsData = localStorage.getItem('gbm_settings');
        safeSettings = settingsData ? JSON.parse(settingsData) : {};
      } catch (e) {
        console.warn('Failed to read settings from localStorage:', e);
        safeSettings = {};
      }

      try {
        const invoiceData = localStorage.getItem('gbm_lastInvoiceNumber');
        safeLastInvoiceNumber = invoiceData ? JSON.parse(invoiceData) : 0;
      } catch (e) {
        console.warn('Failed to read invoice number from localStorage:', e);
        safeLastInvoiceNumber = 0;
      }

      try {
        const trackingData = localStorage.getItem('gbm_trackingCounter');
        safeTrackingCounter = trackingData ? JSON.parse(trackingData) : 0;
      } catch (e) {
        console.warn('Failed to read tracking counter from localStorage:', e);
        safeTrackingCounter = 0;
      }

      try {
        const passwordData = localStorage.getItem('gbm_adminPassword');
        safeAdminPassword = passwordData ? JSON.parse(passwordData) : 'thegreatadmin';
      } catch (e) {
        console.warn('Failed to read admin password from localStorage:', e);
        safeAdminPassword = 'thegreatadmin';
      }

      // Create backup object with all safely initialized data
      const backup = {
        _version: 4,
        _app: 'GlowByMaheshi_POS',
        _exportedAt: new Date().toISOString(),
        settings: safeSettings,
        customers: safeCustomers,
        orders: safeOrders,
        products: safeProducts,
        packages: safePackages,
        tasks: safeTasks,
        lastInvoiceNumber: safeLastInvoiceNumber,
        trackingCounter: safeTrackingCounter,
        adminPassword: safeAdminPassword,
      };

      // Generate JSON and download
      const json = JSON.stringify(backup, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pos_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);

      showToast('✅ Backup exported successfully!');
      console.log('Backup exported successfully with', {
        customers: safeCustomers.length,
        orders: safeOrders.length,
        products: safeProducts.length,
        packages: safePackages.length,
        tasks: safeTasks.length
      });
    } catch (error) {
      console.error('Backup export failed:', error);
      console.error('Error details:', error.message, error.stack);
      showToast('❌ Failed to export backup. Please try again.');
    }
  };

  // ── IMPORT BACKUP ──────────────────────────────────────────────────────────
  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.json')) { showToast('Invalid file — please select a .json backup file.'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        // Validate structure
        if (data._app !== 'GlowByMaheshi_POS') {
          showToast('Invalid backup file — not a Glow By Maheshi backup.');
          return;
        }
        if (!data.settings || !Array.isArray(data.customers) || !Array.isArray(data.orders) || !Array.isArray(data.products)) {
          showToast('Backup file is corrupted or incomplete.');
          return;
        }
        setImportConfirm(data);
      } catch(err) {
        showToast('Failed to read file — invalid JSON format.');
      }
    };
    reader.onerror = () => showToast('Error reading file. Please try again.');
    reader.readAsText(file);
    // Reset input so same file can be re-selected
    e.target.value = '';
  };

  const handleRestoreConfirm = () => {
    const data = importConfirm;
    setSettings(data.settings);
    setCustomers(data.customers);
    setOrders(data.orders);
    setProducts(data.products);
    if (Array.isArray(data.packages)) setPackages(data.packages);
    if (Array.isArray(data.tasks)) setTasks(data.tasks);
    if (data.lastInvoiceNumber !== undefined) setLastInvoiceNumber(data.lastInvoiceNumber);
    if (data.trackingCounter !== undefined) setTrackingCounter(data.trackingCounter);
    if (data.adminPassword) setAdminPassword(data.adminPassword);
    setImportConfirm(null);
    showToast('Backup restored! Reloading...');
    setTimeout(() => window.location.reload(), 1200);
  };

  return (
    <div className="p-6 max-w-3xl">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-gray-800">Settings</h1>
        <p className="text-gray-500 text-sm mt-0.5">Changes apply globally in real-time after saving</p>
      </div>

      {/* Live Preview Banner */}
      <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 mb-5 flex items-center gap-3">
        <span className="text-lg">👁️</span>
        <div className="text-sm text-amber-800">
          <span className="font-semibold">Live Preview:</span> Sidebar & header currently show "<span className="font-bold">{settings.name}</span>" · Tax rate: <span className="font-bold">{settings.tax}%</span> · Prefix: <span className="font-bold">{settings.prefix}</span>
        </div>
      </div>

      <div className="space-y-5">
        <div className="bg-white rounded-2xl shadow-sm p-6">
          <h3 className="font-semibold text-gray-800 mb-4">🏪 Store Information</h3>
          <div className="grid grid-cols-2 gap-4">
            {[['name','Store Name'],['tagline','Tagline'],['phone','Phone'],['address','Address']].map(([k,l])=>(
              <div key={k} className={k==='address'||k==='name'?'col-span-2':''}>
                <label className="block text-xs font-semibold text-gray-600 mb-1.5">{l}</label>
                <input value={form[k]||''} onChange={e=>set(k,e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
              </div>
            ))}
            <div className="col-span-2">
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">🖼️ Logo URL</label>
              <div className="flex gap-2">
                <input value={form.logoUrl||''} onChange={e=>set('logoUrl',e.target.value)}
                  placeholder="https://example.com/logo.png"
                  className="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
                {form.logoUrl && (
                  <button type="button" onClick={()=>set('logoUrl','')}
                    className="px-4 py-2.5 bg-red-50 text-red-600 rounded-xl text-sm font-medium hover:bg-red-100 border border-red-200">
                    Clear
                  </button>
                )}
              </div>
              <p className="text-xs text-gray-400 mt-1.5">This logo will appear in the sidebar (top left corner) and on all printed shipping labels. Leave empty to use default logo.</p>
              {form.logoUrl && (
                <div className="mt-3 p-3 bg-gray-50 rounded-lg">
                  <p className="text-xs font-semibold text-gray-600 mb-2">Preview:</p>
                  <img src={form.logoUrl} alt="Logo preview" className="h-16 object-contain" onError={e=>e.target.style.display='none'} />
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="bg-white rounded-2xl shadow-sm p-6">
          <h3 className="font-semibold text-gray-800 mb-4">🧾 Receipt & Tax Settings</h3>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Invoice Number Prefix</label>
              <input value={form.prefix||''} onChange={e=>set('prefix',e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
              <p className="text-xs text-gray-400 mt-1">Preview: {form.prefix||'INV-'}0001</p>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Tax Rate (%)</label>
              <input type="number" value={form.tax||''} onChange={e=>set('tax',e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" min="0" max="100" />
            </div>
            <div className="col-span-2">
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Receipt Footer Message</label>
              <input value={form.footer||''} onChange={e=>set('footer',e.target.value)}
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                placeholder="e.g. Thank you for shopping with us!" />
            </div>
          </div>
        </div>

        <div className="bg-white rounded-2xl shadow-sm p-6">
          <h3 className="font-semibold text-gray-800 mb-1">🔐 Change Password</h3>
          <p className="text-xs text-gray-400 mb-4">Update the admin login password. Changes apply immediately.</p>
          <div className="space-y-3 max-w-sm">
            {[['current','Current Password'],['newPw','New Password'],['confirm','Confirm New Password']].map(([k,l])=>(
              <div key={k}>
                <label className="block text-xs font-semibold text-gray-600 mb-1.5">{l}</label>
                <input type="password" value={pwForm[k]} onChange={e=>setPw(k,e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
                  placeholder={k==='current'?'Enter current password':'Enter new password'} />
              </div>
            ))}
            <button onClick={handleChangePassword}
              className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors">
              🔑 Update Password
            </button>
          </div>
        </div>

        {/* ── NUMBERING & COUNTERS ─────────────────────────────────────────── */}
        <div className="bg-white rounded-2xl shadow-sm p-6">
          <h3 className="font-semibold text-gray-800 mb-1">🔢 Numbering & Counters</h3>
          <p className="text-xs text-gray-400 mb-5">Control invoice and tracking number sequences. All values persist across refreshes and browser restarts.</p>

          <div className="space-y-5">
            {/* Invoice Number */}
            <div className="border border-gray-100 rounded-xl p-4">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <div className="text-sm font-semibold text-gray-700">📄 Invoice Number</div>
                  <div className="text-xs text-gray-400 mt-0.5">
                    Current: last used <span className="font-mono font-semibold text-indigo-600">{String(lastInvoiceNumber).padStart(4,'0')}</span>
                    &nbsp;· Next invoice: <span className="font-mono font-semibold text-emerald-600">{String(lastInvoiceNumber + 1).padStart(4,'0')}</span>
                  </div>
                </div>
              </div>
              <div className="flex gap-2">
                <input
                  type="number" min="1"
                  value={startInvoiceDraft}
                  onChange={e=>setStartInvoiceDraft(e.target.value)}
                  placeholder="Set next invoice number (e.g. 2345)"
                  className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
                <button onClick={handleSetStartInvoice}
                  className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors whitespace-nowrap">
                  Set
                </button>
              </div>
              <p className="text-xs text-gray-400 mt-1.5">Enter the number you want the <em>next</em> invoice to be. Setting 2345 means next invoice = 2345.</p>
            </div>

            {/* Tracking Number */}
            <div className="border border-gray-100 rounded-xl p-4">
              <div className="mb-3">
                <div className="text-sm font-semibold text-gray-700">🚚 Tracking Number (MC prefix)</div>
                <div className="text-xs text-gray-400 mt-0.5">
                  Current counter: <span className="font-mono font-semibold text-blue-600">{trackingCounter > 0 ? `MC${trackingCounter}` : '—'}</span>
                  &nbsp;· Next order: <span className="font-mono font-semibold text-emerald-600">{trackingCounter > 0 ? `MC${trackingCounter + 1}` : 'Not set'}</span>
                </div>
              </div>
              <div className="bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mb-3 text-xs text-blue-700">
                Auto-increments after every purchase. Prefix <strong>MC</strong> is fixed. Only the number part changes.
              </div>
              <div className="flex gap-2">

              <div className="flex justify-between"><span>📦 Products</span><span className="font-semibold">{importConfirm.products.length}</span></div>

// ─── COURIER TRACKING ────────────────────────────────────────────────────────
function CourierTracking({ showToast, orders, customers }) {
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [trackingNumber, setTrackingNumber] = useState('');
  const [trackingResult, setTrackingResult] = useState(null);
  const [proofOfDelivery, setProofOfDelivery] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  // Search customers and orders
  const searchResults = React.useMemo(() => {
    if (!searchQuery.trim()) return [];

    const query = searchQuery.toLowerCase().trim();
    const results = [];

    // Search through orders
    orders.forEach(order => {
      const customer = customers.find(c => c.id === order.customerId);
      const customerName = customer?.name || order.customer || '';
      const customerPhone = customer?.phone || order.phone || '';
      const orderRef = order.id || '';
      const trackingNo = order.tracking || '';

      // Check if query matches
      if (
        customerName.toLowerCase().includes(query) ||
        customerPhone.toLowerCase().includes(query) ||
        orderRef.toLowerCase().includes(query) ||
        trackingNo.toLowerCase().includes(query)
      ) {
        results.push({
          customer: customer || { name: order.customer, phone: order.phone, id: order.customerId },
          order: order,
          orderRef: orderRef,
          trackingNo: trackingNo
        });
      }
    });

    return results;
  }, [searchQuery, orders, customers]);

  // Get customer orders
  const customerOrders = React.useMemo(() => {
    if (!selectedCustomer) return [];
    return orders.filter(o => o.customerId === selectedCustomer.id || o.customer === selectedCustomer.name)
      .sort((a, b) => b.date.localeCompare(a.date));
  }, [selectedCustomer, orders]);

  // Handle selecting a search result
  const handleSelectResult = (result) => {
    setSelectedCustomer(result.customer);
    setSearchQuery('');
    setError('');
  };

  // Handle selecting an order
  const handleSelectOrder = (order) => {
    setSelectedOrder(order);
    if (order.tracking) {
      setTrackingNumber(order.tracking);
    }
    setTrackingResult(null);
    setProofOfDelivery(null);
    setError('');
  };

  // ============================================================
  // HELPER FUNCTION: Fetch with Timeout and Retry Logic
  // ============================================================
  // This function implements:
  // - 7-second timeout on each request attempt
  // - Up to 2 retries on failure (3 total attempts)
  // - Graceful error handling with user-friendly messages
  // ============================================================
  const fetchWithRetry = async (url, maxRetries = 2, timeoutMs = 7000) => {
    let lastError = null;

    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        // Create abort controller for timeout
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        // Attempt fetch
        const response = await fetch(url, {
          signal: controller.signal,
          headers: {
            'Accept': 'application/json'
          }
        });

        // Clear timeout on success
        clearTimeout(timeoutId);

        // Check response status
        if (!response.ok) {
          throw new Error(`API returned status ${response.status}`);
        }

        // Parse and return JSON
        return await response.json();

      } catch (error) {
        lastError = error;

        // Log retry attempt
        if (attempt < maxRetries) {
          console.log(`Attempt ${attempt + 1} failed, retrying... (${error.message})`);
          // Wait 500ms before retry
          await new Promise(resolve => setTimeout(resolve, 500));
        }
      }
    }

    // All retries failed, throw the last error
    throw lastError;
  };

  // ============================================================
  // TRACK ORDER: Fetch Tracking Status
  // ============================================================
  // API Endpoint: https://gbmv10.manujadamsara11.workers.dev?tracking={trackingNo}&type=status
  //
  // Replace data source:
  // - trackingNumber comes from: state variable (manual input or order selection)
  // - Customer/order data: comes from props (orders, customers)
  // ============================================================
  const handleTrackOrder = async () => {
    // Validate tracking number
    if (!trackingNumber.trim()) {
      setError('Please enter a tracking number');
      return;
    }

    setLoading(true);
    setError('');
    setTrackingResult(null);
    setProofOfDelivery(null);

    try {
      // Fetch tracking status with retry logic
      const statusData = await fetchWithRetry(
        `https://gbmv10.manujadamsara11.workers.dev?tracking=${trackingNumber.trim()}&type=status`,
        2,  // Max 2 retries (3 total attempts)
        7000 // 7-second timeout per attempt
      );

      // Set tracking result
      setTrackingResult(statusData);
      showToast('Tracking information retrieved successfully!');

    } catch (err) {
      // Handle specific error types
      if (err.name === 'AbortError') {
        setError('⏱️ Request timed out after 7 seconds. Please try again.');
      } else if (err.message.includes('status')) {
        setError('❌ Tracking number not found or API error. Please check the tracking number.');
      } else {
        setError('⚠️ Failed to fetch tracking information. Please check your internet connection and try again.');
      }
      showToast('Failed to fetch tracking information');
      console.error('Tracking error:', err);
    } finally {
      setLoading(false);
    }
  };

  // ============================================================
  // FETCH PROOF OF DELIVERY (POD)
  // ============================================================
  // API Endpoint: https://gbmv10.manujadamsara11.workers.dev?tracking={trackingNo}&type=pod
  //
  // This function:
  // - Fetches POD image for the current tracking number
  // - Uses retry logic (up to 2 retries)
  // - 7-second timeout per attempt
  // - Handles multiple response formats (image, base64, data, podImage)
  // ============================================================
  const handleFetchPOD = async () => {
    // Validate tracking number
    if (!trackingNumber.trim()) {
      setError('Please enter a tracking number');
      return;
    }

    setLoading(true);
    setError('');
    setProofOfDelivery(null);

    try {
      // Fetch POD with retry logic
      const podData = await fetchWithRetry(
        `https://gbmv10.manujadamsara11.workers.dev?tracking=${trackingNumber.trim()}&type=pod`,
        2,  // Max 2 retries (3 total attempts)
        7000 // 7-second timeout per attempt
      );

      // Handle different response formats
      // API might return: { image: "base64..." } or { base64: "..." } or { data: "..." } or { podImage: "..." }
      const imageData = podData.image || podData.base64 || podData.data || podData.podImage;

      if (imageData) {
        setProofOfDelivery(imageData);
        showToast('Proof of delivery retrieved successfully!');
      } else {
        throw new Error('Proof of delivery image not found in API response');
      }

    } catch (err) {
      // Handle specific error types
      if (err.name === 'AbortError') {
        setError('⏱️ Request timed out after 7 seconds. Please try again.');
      } else if (err.message.includes('not found')) {
        setError('📄 Proof of delivery not available for this tracking number yet.');
      } else if (err.message.includes('status')) {
        setError('❌ Unable to retrieve proof of delivery. API error.');
      } else {
        setError('⚠️ Failed to fetch proof of delivery. It may not be available yet.');
      }
      showToast('Failed to fetch proof of delivery');
      console.error('POD error:', err);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="p-6 h-full overflow-auto">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-gray-800">Courier Tracking</h1>
        <p className="text-gray-500 text-sm mt-0.5">Search customers and track courier packages</p>
      </div>

      <div className="grid grid-cols-2 gap-6 h-[calc(100vh-180px)]">
        {/* LEFT SIDE - Customer Search & Order List */}
        <div className="bg-white rounded-2xl shadow-sm p-6 overflow-auto">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">Search Customer or Order</h2>

          {/* Search Box */}
          <div className="relative mb-4">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input
              type="text"
              value={searchQuery}
              onChange={e => setSearchQuery(e.target.value)}
              placeholder="Search by name, phone, or order reference..."
              className="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
            />
          </div>

          {/* Search Results */}
          {searchQuery.trim() && (
            <div className="mb-6">
              <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Search Results ({searchResults.length})</div>
              {searchResults.length === 0 ? (
                <div className="text-center py-8 text-gray-400">
                  <div className="text-3xl mb-2">🔍</div>
                  <p className="text-sm">No results found</p>
                </div>
              ) : (
                <div className="space-y-2 max-h-64 overflow-auto">
                  {searchResults.slice(0, 10).map((result, idx) => (
                    <button
                      key={idx}
                      onClick={() => handleSelectResult(result)}
                      className="w-full bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-xl p-3 text-left transition-all"
                    >
                      <div className="flex items-center justify-between mb-1">
                        <div className="font-semibold text-gray-800 text-sm">{result.customer.name}</div>
                        <div className="text-xs font-mono text-indigo-600">{result.orderRef}</div>
                      </div>
                      <div className="text-xs text-gray-500">{result.customer.phone}</div>
                      {result.trackingNo && (
                        <div className="text-xs text-emerald-600 font-medium mt-1">📦 {result.trackingNo}</div>
                      )}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Selected Customer Orders */}
          {selectedCustomer && (
            <div>
              <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center text-sm font-bold flex-shrink-0">
                    {selectedCustomer.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()}
                  </div>
                  <div>
                    <div className="font-semibold text-gray-800">{selectedCustomer.name}</div>
                    <div className="text-sm text-gray-600">{selectedCustomer.phone}</div>
                  </div>
                  <button
                    onClick={() => { setSelectedCustomer(null); setSelectedOrder(null); setTrackingNumber(''); }}
                    className="ml-auto text-xs text-gray-500 hover:text-gray-700"
                  >
                    ✕ Clear
                  </button>
                </div>
              </div>

              <div className="text-xs font-semibold text-gray-500 uppercase mb-2">Customer Orders ({customerOrders.length})</div>
              {customerOrders.length === 0 ? (
                <div className="text-center py-8 text-gray-400">
                  <div className="text-3xl mb-2">📋</div>
                  <p className="text-sm">No orders found</p>
                </div>
              ) : (
                <div className="space-y-2">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="text-xs text-gray-500 border-b border-gray-200">
                        <th className="text-left pb-2 font-semibold">Order Ref</th>
                        <th className="text-left pb-2 font-semibold">Date</th>
                        <th className="text-left pb-2 font-semibold">Tracking</th>
                        <th className="text-center pb-2 font-semibold">Action</th>
                      </tr>
                    </thead>
                    <tbody>
                      {customerOrders.map((order, idx) => (
                        <tr
                          key={idx}
                          className={`border-b border-gray-100 hover:bg-gray-50 ${selectedOrder?.id === order.id ? 'bg-indigo-50' : ''}`}
                        >
                          <td className="py-2 font-mono text-indigo-600 font-semibold">{order.id}</td>
                          <td className="py-2 text-gray-600">{new Date(order.date).toLocaleDateString()}</td>
                          <td className="py-2">
                            {order.tracking ? (
                              <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full font-medium">
                                {order.tracking}
                              </span>
                            ) : (
                              <span className="text-xs text-gray-400">—</span>
                            )}
                          </td>
                          <td className="py-2 text-center">
                            <button
                              onClick={() => handleSelectOrder(order)}
                              disabled={!order.tracking}
                              className="text-xs bg-indigo-600 text-white px-3 py-1 rounded-lg hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
                            >
                              Track
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>

        {/* RIGHT SIDE - Tracking Input & Results */}
        <div className="bg-white rounded-2xl shadow-sm p-6 overflow-auto">
          <h2 className="text-lg font-semibold text-gray-800 mb-4">Track Package</h2>

          {/* Manual Tracking Input */}
          <div className="mb-6">
            <label className="block text-sm font-semibold text-gray-600 mb-2">Enter Tracking Number</label>
            <div className="flex gap-2">
              <input
                type="text"
                value={trackingNumber}
                onChange={e => setTrackingNumber(e.target.value)}
                placeholder="Enter tracking number..."
                className="flex-1 px-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              />
              <button
                onClick={handleTrackOrder}
                disabled={loading || !trackingNumber.trim()}
                className="bg-indigo-600 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2"
              >
                {loading ? '⏳' : '🔍'} Track Order
              </button>
            </div>
            {selectedOrder && (
              <div className="mt-2 text-xs text-gray-500">
                Tracking order: <span className="font-mono font-semibold text-indigo-600">{selectedOrder.id}</span>
              </div>
            )}
          </div>

          {/* Error Message */}
          {error && (
            <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700 mb-4">
              ⚠️ {error}
            </div>
          )}

          {/* Loading Spinner */}
          {loading && (
            <div className="text-center py-12">
              <div className="inline-block animate-spin text-4xl mb-3">⏳</div>
              <p className="text-sm text-gray-500">Fetching tracking information...</p>
            </div>
          )}

          {/* Tracking Result */}
          {trackingResult && !loading && (
            <div className="space-y-4">
              <div className="bg-gradient-to-r from-indigo-50 to-purple-50 border border-indigo-200 rounded-xl p-5">
                <div className="text-xs font-semibold text-indigo-600 uppercase mb-3">Package Status</div>
                <div className="space-y-3">
                  <div className="flex items-start justify-between">
                    <div className="text-sm text-gray-600">Tracking Number:</div>
                    <div className="text-sm font-mono font-bold text-gray-800">{trackingResult.trackingNo || trackingNumber}</div>
                  </div>
                  <div className="flex items-start justify-between">
                    <div className="text-sm text-gray-600">Current Status:</div>
                    <div className="text-sm font-semibold">
                      <span className={`px-3 py-1 rounded-full ${
                        trackingResult.status?.toLowerCase() === 'delivered' ? 'bg-emerald-100 text-emerald-700' :
                        trackingResult.status?.toLowerCase() === 'in transit' ? 'bg-blue-100 text-blue-700' :
                        'bg-amber-100 text-amber-700'
                      }`}>
                        {trackingResult.status || 'Unknown'}
                      </span>
                    </div>
                  </div>
                  {trackingResult.branchName && (
                    <div className="flex items-start justify-between">
                      <div className="text-sm text-gray-600">Branch:</div>
                      <div className="text-sm font-semibold text-gray-800">{trackingResult.branchName}</div>
                    </div>
                  )}
                  {trackingResult.statusDate && (
                    <div className="flex items-start justify-between">
                      <div className="text-sm text-gray-600">Status Date:</div>
                      <div className="text-sm font-semibold text-gray-800">
                        {new Date(trackingResult.statusDate).toLocaleString()}
                      </div>
                    </div>
                  )}
                </div>

                {/* View Proof of Delivery Button */}
                <div className="mt-4 pt-4 border-t border-indigo-200">
                  <button
                    onClick={handleFetchPOD}
                    disabled={loading}
                    className="w-full bg-emerald-600 text-white px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-emerald-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                  >
                    {loading ? '⏳' : '📄'} View Proof of Delivery
                  </button>
                </div>
              </div>

              {/* Proof of Delivery */}
              {proofOfDelivery && (
                <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-5">
                  <div className="text-xs font-semibold text-emerald-700 uppercase mb-3">✅ Customer Signed Proof of Delivery</div>
                  <div className="bg-white rounded-lg p-3 border border-emerald-200">
                    <img
                      src={`data:image/png;base64,${proofOfDelivery}`}
                      alt="Proof of Delivery"
                      className="w-full h-auto rounded-lg"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.nextSibling.style.display = 'block';
                      }}
                    />
                    <div style={{display:'none'}} className="text-center py-8 text-gray-400">
                      <div className="text-3xl mb-2">📄</div>
                      <p className="text-sm">Proof of delivery image unavailable</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Empty State */}
          {!trackingResult && !loading && !error && (
            <div className="text-center py-16 text-gray-400">
              <div className="text-5xl mb-4">🚚</div>
              <p className="text-sm font-medium mb-1">No tracking information yet</p>
              <p className="text-xs">Enter a tracking number or select an order to track</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── TASK MANAGER ────────────────────────────────────────────────────────────
function TaskManager({ showToast, tasks = [], setTasks, customers = [] }) {
  const [showAddModal, setShowAddModal] = useState(false);
  const [showEditModal, setShowEditModal] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [currentTask, setCurrentTask] = useState(null);
  const [filter, setFilter] = useState('all');
  const [form, setForm] = useState({
    title: '',
    description: '',
    customerName: '',
    dueDate: '',
    priority: 'medium',
    status: 'pending'
  });

  const resetForm = () => {
    setForm({
      title: '',
      description: '',
      customerName: '',
      dueDate: '',
      priority: 'medium',
      status: 'pending'
    });
  };

  const handleAdd = () => {
    if (!form.title.trim()) {
      showToast('❌ Task title is required');
      return;
    }
    const newTask = {
      id: Date.now(),
      ...form,
      createdAt: new Date().toISOString(),
      completedAt: null
    };
    setTasks([...tasks, newTask]);
    showToast('✅ Task added successfully');
    resetForm();
    setShowAddModal(false);
  };

  const handleEdit = () => {
    if (!form.title.trim()) {
      showToast('❌ Task title is required');
      return;
    }
    setTasks(tasks.map(t => t.id === currentTask.id ? { ...t, ...form } : t));
    showToast('✅ Task updated successfully');
    resetForm();
    setShowEditModal(false);
    setCurrentTask(null);
  };

  const handleMarkComplete = (task) => {
    const updatedTask = {
      ...task,
      status: 'completed',
      completedAt: new Date().toISOString()
    };
    setTasks(tasks.map(t => t.id === task.id ? updatedTask : t));
    showToast('✅ Task marked as completed');
  };

  const handleDelete = () => {
    setTasks(tasks.filter(t => t.id !== currentTask.id));
    showToast('🗑️ Task deleted successfully');
    setShowDeleteConfirm(false);
    setCurrentTask(null);
  };

  const openEditModal = (task) => {
    setCurrentTask(task);
    setForm({
      title: task.title,
      description: task.description || '',
      customerName: task.customerName || '',
      dueDate: task.dueDate || '',
      priority: task.priority,
      status: task.status
    });
    setShowEditModal(true);
  };

  const openDeleteConfirm = (task) => {
    setCurrentTask(task);
    setShowDeleteConfirm(true);
  };

  // Filter logic
  const today = new Date().setHours(0, 0, 0, 0);
  const filteredTasks = tasks.filter(task => {
    if (filter === 'all') return true;
    if (filter === 'pending') return task.status === 'pending';
    if (filter === 'completed') return task.status === 'completed';
    if (filter === 'overdue') {
      if (task.status === 'completed') return false;
      if (!task.dueDate) return false;
      return new Date(task.dueDate).setHours(0, 0, 0, 0) < today;
    }
    return true;
  });

  const pendingTasks = filteredTasks.filter(t => t.status === 'pending');
  const completedTasks = filteredTasks.filter(t => t.status === 'completed');

  const isOverdue = (task) => {
    if (task.status === 'completed') return false;
    if (!task.dueDate) return false;
    return new Date(task.dueDate).setHours(0, 0, 0, 0) < today;
  };

  const getPriorityColor = (priority) => {
    if (priority === 'high') return 'bg-red-100 text-red-700 border-red-200';
    if (priority === 'medium') return 'bg-amber-100 text-amber-700 border-amber-200';
    return 'bg-blue-100 text-blue-700 border-blue-200';
  };

  const getPriorityLabel = (priority) => {
    if (priority === 'high') return '🔴 High';
    if (priority === 'medium') return '🟡 Medium';
    return '🔵 Low';
  };

  return (
    <div className="p-6 space-y-6">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Task Manager</h1>
          <p className="text-gray-500 text-sm mt-0.5">Manage your tasks and to-do items</p>
        </div>
        <button onClick={() => { resetForm(); setShowAddModal(true); }}
          className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors flex items-center gap-2">
          ➕ Add New Task
        </button>
      </div>

      {/* Filters */}
      <div className="flex gap-3 flex-wrap">
        {[
          { id: 'all', label: 'All Tasks', count: tasks.length },
          { id: 'pending', label: 'Pending', count: tasks.filter(t => t.status === 'pending').length },
          { id: 'completed', label: 'Completed', count: tasks.filter(t => t.status === 'completed').length },
          { id: 'overdue', label: 'Overdue', count: tasks.filter(t => t.status === 'pending' && t.dueDate && new Date(t.dueDate).setHours(0, 0, 0, 0) < today).length },
        ].map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)}
            className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${
              filter === f.id
                ? 'bg-indigo-600 text-white shadow-md'
                : 'bg-white text-gray-600 border border-gray-200 hover:border-indigo-300'
            }`}>
            {f.label} <span className={`ml-1.5 px-2 py-0.5 rounded-full text-xs font-bold ${
              filter === f.id ? 'bg-white/20' : 'bg-gray-100'
            }`}>{f.count}</span>
          </button>
        ))}
      </div>

      {/* Tasks Grid */}
      <div className="grid grid-cols-2 gap-5">
        {/* Pending Tasks */}
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100">
          <div className="px-6 py-4 border-b border-gray-100">
            <h3 className="font-semibold text-gray-800 flex items-center gap-2">
              ⏳ Pending Tasks
              <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">
                {pendingTasks.length}
              </span>
            </h3>
          </div>
          <div className="p-4 space-y-3 max-h-96 overflow-y-auto">
            {pendingTasks.length === 0 ? (
              <div className="text-center py-8">
                <div className="text-4xl mb-2">✅</div>
                <p className="text-sm text-gray-500">No pending tasks</p>
              </div>
            ) : (
              pendingTasks.map(task => (
                <div key={task.id} className={`border rounded-xl p-4 hover:shadow-md transition-all ${
                  isOverdue(task) ? 'border-red-300 bg-red-50' : 'border-gray-200 bg-white'
                }`}>
                  <div className="flex items-start justify-between mb-2">
                    <h4 className="font-semibold text-gray-800 text-sm flex-1">{task.title}</h4>
                    <span className={`px-2 py-0.5 rounded-lg text-xs font-semibold border ${getPriorityColor(task.priority)}`}>
                      {getPriorityLabel(task.priority)}
                    </span>
                  </div>
                  {task.description && (
                    <p className="text-xs text-gray-600 mb-2 line-clamp-2">{task.description}</p>
                  )}
                  {task.customerName && (
                    <div className="flex items-center gap-1.5 text-xs text-gray-500 mb-2">
                      <span>👤</span>
                      <span>{task.customerName}</span>
                    </div>
                  )}
                  {task.dueDate && (
                    <div className={`flex items-center gap-1.5 text-xs mb-3 ${
                      isOverdue(task) ? 'text-red-600 font-semibold' : 'text-gray-500'
                    }`}>
                      <span>📅</span>
                      <span>Due: {new Date(task.dueDate).toLocaleDateString()}</span>
                      {isOverdue(task) && <span className="font-bold">⚠️ OVERDUE</span>}

                  )}
                  <div className="flex gap-2">
                    <button onClick={() => handleMarkComplete(task)}
                      className="flex-1 bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-green-100 transition-colors">

                    </button>
                    <button onClick={() => openEditModal(task)}
                      className="flex-1 bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-blue-100 transition-colors">
                      ✏️ Edit

                    <button onClick={() => openDeleteConfirm(task)}

                      🗑️
                    </button>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>

        {/* Completed Tasks */}
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100">
          <div className="px-6 py-4 border-b border-gray-100">
            <h3 className="font-semibold text-gray-800 flex items-center gap-2">
              ✅ Completed Tasks
              <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">
                {completedTasks.length}
              </span>
            </h3>
          </div>
          <div className="p-4 space-y-3 max-h-96 overflow-y-auto">
            {completedTasks.length === 0 ? (
              <div className="text-center py-8">
                <div className="text-4xl mb-2">📋</div>
                <p className="text-sm text-gray-500">No completed tasks yet</p>
              </div>
            ) : (
              completedTasks.map(task => (
                <div key={task.id} className="border border-gray-200 bg-gray-50 rounded-xl p-4 opacity-75">
                  <div className="flex items-start justify-between mb-2">
                    <h4 className="font-semibold text-gray-600 text-sm flex-1 line-through">{task.title}</h4>
                    <span className={`px-2 py-0.5 rounded-lg text-xs font-semibold border ${getPriorityColor(task.priority)}`}>
                      {getPriorityLabel(task.priority)}
                    </span>
                  </div>
                  {task.description && (
                    <p className="text-xs text-gray-500 mb-2 line-clamp-2">{task.description}</p>
                  )}
                  {task.completedAt && (
                    <div className="flex items-center gap-1.5 text-xs text-green-600 mb-2">
                      <span>✅</span>
                      <span>Completed: {new Date(task.completedAt).toLocaleDateString()}</span>

                  <div className="flex gap-2">
                    <button onClick={() => openEditModal(task)}

                    <button onClick={() => openDeleteConfirm(task)}

                      🗑️ Delete
                    </button>

      {/* Add Task Modal */}

              </div>
              <div>
                <label className="block text-xs font-semibold text-gray-600 mb-1.5">Description</label>

            <div className="flex gap-3 mt-6">

      )}

      {/* Delete Confirmation Modal */}
      {showDeleteConfirm && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowDeleteConfirm(false)}>
          <div className="modal-box-sm">
            <div className="flex items-center gap-3 mb-4">
              <div className="w-11 h-11 bg-red-100 rounded-xl flex items-center justify-center text-2xl flex-shrink-0">🗑️</div>
              <div>
                <h2 className="text-base font-bold text-gray-800">Delete Task?</h2>
                <p className="text-xs text-gray-500 mt-0.5">This action cannot be undone</p>

            <div className="flex gap-3">
              <button onClick={() => { setShowDeleteConfirm(false); setCurrentTask(null); }}
                className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors">
                Cancel
              </button>
              <button onClick={handleDelete}
                className="flex-1 bg-red-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-red-700 transition-colors">
                🗑️ Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── LOGIN SCREEN ────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, adminPassword, settings, setAdminPassword }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [showForgotPw, setShowForgotPw] = useState(false);
  const [otp, setOtp] = useState('');
  const [showResetPw, setShowResetPw] = useState(false);
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');

  const validOtps = ["197415", "199910"];

  const handleSubmit = (e) => {
    e.preventDefault();
    if (username === 'admin' && password === adminPassword) {
      onLogin();
    } else {
      setError('Invalid username or password. Please try again.');
    }
  };

  const handleOtpVerify = (e) => {
    e.preventDefault();
    if (validOtps.includes(otp.trim())) {
      setShowForgotPw(false);
      setShowResetPw(true);
      setError('');
      setOtp('');
    } else {
      setError('Invalid verification code.');
    }
  };

  const handlePasswordReset = (e) => {
    e.preventDefault();
    if (!newPassword.trim()) {
      setError('Password cannot be empty.');
      return;
    }
    if (newPassword !== confirmPassword) {
      setError('Passwords do not match.');
      return;
    }
    setAdminPassword(newPassword);
    lsSet('gbm_adminPassword', newPassword);
    setShowResetPw(false);
    setNewPassword('');
    setConfirmPassword('');
    setError('');
    alert('Password updated successfully! Please login with your new password.');
  };

  // OTP Verification Screen
  if (showForgotPw) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background:'linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#a855f7 100%)' }}>
        <div className="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4">
          <div className="text-center mb-8">
            <div className="text-5xl mb-4">🔐</div>
            <h1 className="text-2xl font-bold text-gray-800">Verification Required</h1>
            <p className="text-gray-500 text-sm mt-1">Enter your 6-digit verification code</p>
          </div>
          <form onSubmit={handleOtpVerify} className="space-y-4">
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">OTP Code</label>
              <div className="relative">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔢</span>
                <input type="text" value={otp} onChange={e=>{setOtp(e.target.value);setError('');}}
                  placeholder="Enter 6-digit code"
                  maxLength="6"
                  className="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 text-center text-lg font-mono tracking-widest" />
              </div>
            </div>
            {error && (
              <div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700 font-medium">
                ⚠️ {error}
              </div>
            )}
            <button type="submit"
              className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3.5 rounded-xl font-semibold text-sm hover:from-indigo-700 hover:to-purple-700 transition-all shadow-md mt-2">

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// SHIPPING LABEL GENERATOR - EXACT TEMPLATE MATCH
// ═══════════════════════════════════════════════════════════════════════════

function extractCityFromAddress(address) {
  if (!address) return '';
  const words = address.trim().split(/\s+/);
  const lastWord = words[words.length - 1];
  return lastWord.replace(/,/g, '').trim();
}

function buildShippingContent(order, products, maxItems = null) {
  if (!order.itemsList || order.itemsList.length === 0) {
    return order.items || 'N/A';
  }
  const packageItems = order.itemsList.filter(item => item.type === 'package');
  if (packageItems.length > 0) {
    return packageItems.map(pkg => {
      if (pkg.breakdown && pkg.breakdown.length > 0) {
        // Build breakdown items array
        const breakdownItems = pkg.breakdown.map(b => {
          // Find product by ID
          const product = products.find(p => p.id === b.productId);
          const productName = product ? product.name : 'Unknown Product';
          // Calculate total quantity: qtyRequired × package qty
          const totalQty = b.qtyRequired * pkg.qty;
          return { name: productName, qty: totalQty };
        });

        // Apply item limit if specified
        let displayItems = breakdownItems;
        let hiddenCount = 0;
        if (maxItems !== null && breakdownItems.length > maxItems) {
          displayItems = breakdownItems.slice(0, maxItems);
          hiddenCount = breakdownItems.length - maxItems;
        }

        const breakdownStr = displayItems.map(item => `${item.name} x${item.qty}`).join(', ');
        const hiddenStr = hiddenCount > 0 ? `, ${hiddenCount} more items...` : '';
        return `${pkg.name} (${breakdownStr}${hiddenStr})`;
      }
      return `${pkg.name} x${pkg.qty}`;
    }).join('; ');
  }
  if (order.itemsList.length > 1) {
    return order.itemsList.map(item => `${item.name} x${item.qty}`).join(', ');
  } else {
    const item = order.itemsList[0];
    return `${item.name} x${item.qty}`;
  }
}

function escapeHtmlContent(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatDateTime(dateStr) {
  if (dateStr && dateStr.includes(':')) {
    return dateStr;
  }
  const date = new Date(dateStr);
  const time = date.toLocaleTimeString('en-US', {
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
    hour12: true
  });
  return `${dateStr}, ${time}`;
}

async function generateShippingLabelsExactTemplate(orders, settings, products) {
  console.log('[Shipping Labels] Starting generation...');
  console.log('[Shipping Labels] Total orders received:', orders?.length || 0);

  if (!orders || orders.length === 0) {
    alert('No orders to print');
    return;
  }

  if (!products || products.length === 0) {
    console.warn('[Shipping Labels] No products data provided');
  }

  // Get logo URL from settings, with fallback
  const logoUrl = settings?.logoUrl || 'https://creao-copilot-production.s3.us-west-2.amazonaws.com/uploads/98412310-b0c1-7072-8109-c8bd5a36456f/e96308b8-bec9-40a2-a87c-deb91bdd1cc1-CM-GLOW-Gold.png';
  console.log('[Shipping Labels] Logo URL:', logoUrl);

  // Preload logo image
  try {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        console.log('[Shipping Labels] Logo loaded successfully');
        resolve();
      };
      img.onerror = () => {
        console.warn('[Shipping Labels] Logo failed to load, continuing anyway');
        resolve(); // Continue even if logo fails
      };
      img.src = logoUrl;
      // Timeout after 3 seconds
      setTimeout(() => resolve(), 3000);
    });
  } catch (e) {
    console.warn('[Shipping Labels] Logo preload error:', e);
  }

  const ordersWithTracking = orders.filter(o => o.tracking && o.tracking.trim() !== '');
  console.log('[Shipping Labels] Orders with tracking:', ordersWithTracking.length);

  if (ordersWithTracking.length === 0) {
    alert('No orders with tracking numbers found. Please add tracking numbers to orders before printing shipping labels.');
    return;
  }

  const container = document.getElementById('shipping-labels-print');
  if (!container) {
    console.error('[Shipping Labels] Container not found!');
    return;
  }

  container.innerHTML = '';
  const barcodeIds = [];

  console.log('[Shipping Labels] Generating labels for', ordersWithTracking.length, 'orders...');
  ordersWithTracking.forEach((order, index) => {
    const pageDiv = document.createElement('div');
    pageDiv.className = 'shipping-label-page';
    const city = extractCityFromAddress(order.address);
    const contentStr = buildShippingContent(order, products || []);
    const dateTime = formatDateTime(order.date);
    const barcodeId = `sl-barcode-${index}-${Date.now()}`;
    barcodeIds.push({ order, barcodeId });
    pageDiv.innerHTML = `
      <div class="shipping-label" data-order-id="${escapeHtmlContent(order.id)}">
        <div class="sl-logo-section">
          <div class="sl-logo">
            <img src="${logoUrl}" alt="${escapeHtmlContent(settings?.name || 'Glow By Maheshi')}" crossorigin="anonymous">
          </div>
          <div class="sl-tracking-box">
            <div class="sl-tracking-label">Tracking Number</div>
            <div class="sl-tracking-number-box">${escapeHtmlContent(order.tracking)}</div>
          </div>
        </div>
        <div class="sl-main-content">
          <div class="sl-section-title">TO / Receiver</div>
          <div class="sl-receiver-name">${escapeHtmlContent(order.customer)}</div>
          <div class="sl-address-line">${escapeHtmlContent(order.address)}</div>
          <div class="sl-city-line">${escapeHtmlContent(city)}</div>

            <svg id="${barcodeId}"></svg>

          </div>

            <div>
              <div class="sl-section-title">FROM / Sender</div>

            </div>
            <div>
              <div class="sl-section-title">Contents:</div>

            </div>
          </div>
          <div class="sl-remarks-section">
            <div class="sl-remarks-title">Remarks:</div>

        </div>
        <div class="sl-footer-section">
          <div class="sl-ref-text">Ref: ${escapeHtmlContent(order.id)}</div>
        </div>
      </div>
    `;
    container.appendChild(pageDiv);
  });

  console.log('[Shipping Labels] All pages added to container');
  console.log('[Shipping Labels] Container children count:', container.children.length);

  // Generate barcodes
  setTimeout(() => {
    console.log('[Shipping Labels] Generating barcodes...');
    let barcodesGenerated = 0;

    barcodeIds.forEach(({ order, barcodeId }) => {
      const element = document.getElementById(barcodeId);

          JsBarcode(element, order.tracking, {
            format: 'CODE128',
            width: 3,
            height: 100,
            displayValue: false,
            margin: 10
          });
          barcodesGenerated++;
        } catch (e) {
          console.error('[Shipping Labels] Barcode generation failed:', e);

      } else {

      }
    });

    console.log('[Shipping Labels] Barcodes generated:', barcodesGenerated, '/', barcodeIds.length);

    // Wait for images to load
    const images = container.querySelectorAll('img');
    console.log('[Shipping Labels] Images found:', images.length);

    Promise.all(Array.from(images).map(img => {
      if (img.complete) return Promise.resolve();
      return new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
        setTimeout(resolve, 2000); // Timeout after 2s
      });
    })).then(() => {
      console.log('[Shipping Labels] All images loaded, applying auto-shrink...');

      // Auto-shrink system for shipping labels
      const allLabels = container.querySelectorAll('.shipping-label');
      allLabels.forEach((label, idx) => {
        const mainContent = label.querySelector('.sl-main-content');
        if (!mainContent) return;

        const MIN_FONT_SIZE = 14;
        const MAX_FONT_SIZE = 20;
        const MAX_ITEMS_BEFORE_TRUNCATE = 8;

        let fontSize = MAX_FONT_SIZE;
        let attemptCount = 0;
        const maxAttempts = 20;

        // Try shrinking font size
        while (mainContent.scrollHeight > mainContent.clientHeight && fontSize > MIN_FONT_SIZE && attemptCount < maxAttempts) {
          fontSize--;
          mainContent.style.fontSize = fontSize + 'px';
          attemptCount++;
        }

        console.log(`[Auto-shrink] Label ${idx + 1}: final fontSize = ${fontSize}px, overflow = ${mainContent.scrollHeight > mainContent.clientHeight}`);

        // Hard safety limit: if still overflowing, regenerate with truncated items
        if (mainContent.scrollHeight > mainContent.clientHeight && fontSize <= MIN_FONT_SIZE) {
          console.warn(`[Auto-shrink] Label ${idx + 1}: Still overflowing at minimum font size, applying item truncation...`);

          const orderId = label.getAttribute('data-order-id');
          const order = orders.find(o => o.id === orderId);

          if (order) {
            const contentStr = buildShippingContent(order, products || [], MAX_ITEMS_BEFORE_TRUNCATE);
            const contentTextEl = label.querySelector('.sl-content-text');
            if (contentTextEl) {
              contentTextEl.textContent = contentStr;
            }
            // Re-check after truncation
            if (mainContent.scrollHeight > mainContent.clientHeight) {
              console.warn(`[Auto-shrink] Label ${idx + 1}: Still overflowing after truncation (overflow: ${mainContent.scrollHeight - mainContent.clientHeight}px)`);
            }
          }
        }
      });

      console.log('[Shipping Labels] Auto-shrink complete, opening print dialog...');
      setTimeout(() => {
        window.print();
      }, 500);
    });
  }, 100);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Shipping Labels Print Container -->
<div id="shipping-labels-print" class="print-shipping-wrapper"></div>

</body>
</html>
