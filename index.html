// ─── HEATMAP HELPERS ─────────────────────────────────────────────────────────
function generateHeatmapData() {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const daysInMonth = [31,28,31,30,31,30,31,31,30,31,30,31];
  return months.map((m, mi) => ({
    month: m,
    days: Array.from({ length: daysInMonth[mi] }, () => Math.random())
  }));
}
const SALES_HEATMAP = generateHeatmapData();
const PURCHASES_HEATMAP = generateHeatmapData();

function heatColor(val, hue='210') {
  const light = Math.round(95 - val * 55);
  return val < 0.05 ? '#f1f5f9' : `hsl(${hue},70%,${light}%)`;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ message, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  return <div className="toast">✓ {message}</div>;
}

// ─── HEATMAP ─────────────────────────────────────────────────────────────────
function Heatmap({ data, title, hue }) {
  return (
    <div className="bg-white rounded-2xl p-5 shadow-sm">
      <div className="flex items-center gap-2 mb-4">
        <span className="text-lg">{hue==='210'?'💰':'🛍️'}</span>
        <h3 className="font-semibold text-gray-800">{title}</h3>
        <span className="ml-auto text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-full">2026</span>
      </div>
      <div className="flex gap-3 overflow-x-auto pb-2">
        {data.map((m, mi) => (
          <div key={mi} className="flex-shrink-0">
            <div className="text-xs text-gray-400 mb-1 font-medium text-center">{m.month}</div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,14px)', gap:'2px' }}>
              {m.days.map((v, di) => (
                <div key={di} className="heatmap-cell" style={{ background: heatColor(v, hue), width:12, height:12 }}
                  title={`${m.month} ${di+1}: LKR ${Math.round(v*500)}`} />
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="flex items-center gap-2 mt-3 justify-end">
        <span className="text-xs text-gray-400">Less</span>
        {[0.05,0.25,0.5,0.75,1].map(v => (
          <div key={v} className="heatmap-cell" style={{ background: heatColor(v, hue) }} />
        ))}
        <span className="text-xs text-gray-400">More</span>
      </div>
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard({ settings, orders, tasks, products }) {
  const [showDailyReport, setShowDailyReport] = useState(false);

  // Calculate real-time totals from actual orders
  const totals = React.useMemo(() => {
    const sales = orders.reduce((sum, o) => sum + (o.amount || 0), 0);
    const received = orders.filter(o => o.status === 'Paid').reduce((sum, o) => sum + (o.amount || 0), 0);
    // For demo purposes, estimate purchases and expenses as percentages
    const purchases = sales * 0.5; // Assume 50% of sales
    const expenses = sales * 0.15; // Assume 15% of sales
    return { sales, purchases, expenses, received };
  }, [orders]);

  // Task statistics
  const taskStats = React.useMemo(() => {
    const today = new Date().setHours(0, 0, 0, 0);
    const pending = tasks.filter(t => t.status === 'pending').length;
    const overdue = tasks.filter(t =>
      t.status === 'pending' &&
      t.dueDate &&
      new Date(t.dueDate).setHours(0, 0, 0, 0) < today
    ).length;
    const dueToday = tasks.filter(t =>
      t.status === 'pending' &&
      t.dueDate &&
      new Date(t.dueDate).setHours(0, 0, 0, 0) === today
    );
    return { pending, overdue, dueToday };
  }, [tasks]);

    { label:'Total Expenses',    value:`LKR ${totals.expenses.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`,  icon:'💸', gradient:'linear-gradient(135deg,#7c3aed,#a855f7)', trend:8.7 },
    { label:'Payments Received', value:`LKR ${totals.received.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`,  icon:'💳', gradient:'linear-gradient(135deg,#059669,#10b981)', trend:15.2 },
  ];

  return (
    <div className="p-6 space-y-6">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Dashboard</h1>
          <p className="text-gray-500 text-sm mt-0.5">Welcome back, Admin · {settings.name}</p>

// ─── PRODUCT REPORT MODAL (DATE RANGE) ──────────────────────────────────────
function DailyProductReportModal({ orders, products, onClose }) {
  const today = new Date().toISOString().split('T')[0];
  const [startDate, setStartDate] = useState(today);
  const [endDate, setEndDate] = useState(today);
  const canvasRef = useRef(null);

  // Filter orders by date range
  const filteredOrders = orders.filter(order => {
    return order.date >= startDate && order.date <= endDate;
  });

  // Calculate product sales data
  const productSalesMap = {};

  filteredOrders.forEach(order => {
    if (order.itemsList && order.itemsList.length > 0) {
      order.itemsList.forEach(item => {
        if (item.type === 'package') {
          // Handle packages - we'll count the package itself
          const key = item.packageId || item.name;
          if (!productSalesMap[key]) {
            productSalesMap[key] = {
              productId: item.packageId,
              productName: item.name,
              totalQtySold: 0,
              totalRevenue: 0
            };
          }
          productSalesMap[key].totalQtySold += item.qty || 0;
          productSalesMap[key].totalRevenue += (item.price || 0) * (item.qty || 0);
        } else {
          // Regular product
          const product = products.find(p => p.name === item.name);
          const key = product ? product.id : item.name;
          if (!productSalesMap[key]) {
            productSalesMap[key] = {
              productId: product?.id,
              productName: item.name,
              totalQtySold: 0,
              totalRevenue: 0
            };
          }
          productSalesMap[key].totalQtySold += item.qty || 0;
          productSalesMap[key].totalRevenue += (item.price || 0) * (item.qty || 0);
        }
      });
    }
  });

  const productSalesData = Object.values(productSalesMap).sort((a, b) => b.totalQtySold - a.totalQtySold);

  const totalProductsSold = productSalesData.reduce((sum, p) => sum + p.totalQtySold, 0);
  const totalRevenue = productSalesData.reduce((sum, p) => sum + p.totalRevenue, 0);

  // Draw chart
  useEffect(() => {
    if (!canvasRef.current || productSalesData.length === 0) return;

    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;

    // Clear canvas
    ctx.clearRect(0, 0, width, height);

    // Chart settings
    const padding = 40;
    const chartWidth = width - padding * 2;
    const chartHeight = height - padding * 2;
    const barWidth = Math.min(chartWidth / productSalesData.length - 10, 60);
    const maxQty = Math.max(...productSalesData.map(p => p.totalQtySold), 1);

    // Draw bars
    productSalesData.forEach((product, index) => {
      const barHeight = (product.totalQtySold / maxQty) * chartHeight;
      const x = padding + index * (chartWidth / productSalesData.length) + (chartWidth / productSalesData.length - barWidth) / 2;
      const y = padding + chartHeight - barHeight;

      // Gradient fill
      const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
      gradient.addColorStop(0, '#4f46e5');
      gradient.addColorStop(1, '#7c3aed');

      ctx.fillStyle = gradient;
      ctx.fillRect(x, y, barWidth, barHeight);

      // Value on top of bar
      ctx.fillStyle = '#374151';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(product.totalQtySold, x + barWidth / 2, y - 5);

      // Product name below chart
      ctx.fillStyle = '#6b7280';
      ctx.font = '11px sans-serif';
      ctx.save();
      ctx.translate(x + barWidth / 2, height - padding + 15);
      ctx.rotate(-Math.PI / 4);
      ctx.textAlign = 'right';
      const maxLen = 15;
      const label = product.productName.length > maxLen ? product.productName.substring(0, maxLen) + '...' : product.productName;
      ctx.fillText(label, 0, 0);
      ctx.restore();
    });

    // Y-axis
    ctx.strokeStyle = '#d1d5db';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padding, padding);
    ctx.lineTo(padding, padding + chartHeight);
    ctx.stroke();

    // X-axis
    ctx.beginPath();
    ctx.moveTo(padding, padding + chartHeight);
    ctx.lineTo(padding + chartWidth, padding + chartHeight);
    ctx.stroke();

    // Y-axis label
    ctx.fillStyle = '#374151';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.save();
    ctx.translate(15, padding + chartHeight / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Quantity Sold', 0, 0);
    ctx.restore();

  }, [productSalesData, startDate, endDate]);

  const handlePrint = () => {
    const printWindow = window.open('', '_blank');
    const dateRangeStr = startDate === endDate ? new Date(startDate).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : `${startDate} to ${endDate}`;
    printWindow.document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <title>Product Report - ${dateRangeStr}</title>
        <style>
          body { font-family: Arial, sans-serif; padding: 40px; }
          h1 { color: #1f2937; margin-bottom: 10px; }
          .meta { color: #6b7280; font-size: 14px; margin-bottom: 30px; }
          .summary { display: flex; gap: 20px; margin-bottom: 30px; }
          .summary-card { background: #f3f4f6; padding: 15px; border-radius: 8px; flex: 1; }
          .summary-card h3 { margin: 0; font-size: 14px; color: #6b7280; }
          .summary-card p { margin: 5px 0 0 0; font-size: 24px; font-weight: bold; color: #1f2937; }
          table { width: 100%; border-collapse: collapse; margin-top: 20px; }
          th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
          th { background: #f9fafb; font-weight: 600; color: #374151; }
          tr:hover { background: #f9fafb; }
          .total-row { font-weight: bold; background: #f3f4f6; }
        </style>
      </head>
      <body>
        <h1>Product Sales Report</h1>
        <div class="meta">Date Range: ${dateRangeStr}</div>
        <div class="summary">
          <div class="summary-card">
            <h3>Total Products Sold</h3>
            <p>${totalProductsSold}</p>
          </div>
          <div class="summary-card">
            <h3>Total Revenue</h3>
            <p>LKR ${totalRevenue.toFixed(2)}</p>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Product Name</th>
              <th>Quantity Sold</th>
              <th>Total Revenue</th>
            </tr>
          </thead>
          <tbody>
            ${productSalesData.map(p => `
              <tr>
                <td>${p.productName}</td>
                <td>${p.totalQtySold}</td>
                <td>LKR ${p.totalRevenue.toFixed(2)}</td>
              </tr>
            `).join('')}
            <tr class="total-row">
              <td>TOTAL</td>
              <td>${totalProductsSold}</td>
              <td>LKR ${totalRevenue.toFixed(2)}</td>
            </tr>
          </tbody>
        </table>
      </body>
      </html>
    `);
    printWindow.document.close();
    setTimeout(() => {
      printWindow.print();
    }, 500);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{background:'white',borderRadius:20,padding:28,width:'90%',maxWidth:1000,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between mb-5">
          <div>
            <h2 className="text-2xl font-bold text-gray-800">Product Sales Report</h2>
            <p className="text-sm text-gray-500 mt-1">Analyze product sales by date range</p>
          </div>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <div className="flex items-center gap-4 mb-6">
          <div className="flex items-center gap-3">
            <label className="text-sm font-semibold text-gray-600">Date Range:</label>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
              max={new Date().toISOString().split('T')[0]}
              className="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
            <span className="text-gray-400">→</span>
            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
              max={new Date().toISOString().split('T')[0]}
              className="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
          </div>
          <button onClick={handlePrint}
            className="ml-auto flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-700">
            🖨️ Print Report
          </button>
        </div>

        {productSalesData.length === 0 ? (
          <div className="text-center py-16 text-gray-400">
            <div className="text-4xl mb-3">📊</div>
            <p className="text-sm">No sales data for {startDate === endDate ? new Date(startDate).toLocaleDateString() : `${startDate} to ${endDate}`}</p>
          </div>
        ) : (
          <>
            <div className="grid grid-cols-2 gap-4 mb-6">
              <div className="bg-indigo-50 rounded-xl p-4">
                <div className="text-sm font-semibold text-indigo-600 mb-1">Total Products Sold</div>
                <div className="text-3xl font-bold text-indigo-700">{totalProductsSold}</div>
              </div>
              <div className="bg-emerald-50 rounded-xl p-4">
                <div className="text-sm font-semibold text-emerald-600 mb-1">Total Revenue</div>
                <div className="text-3xl font-bold text-emerald-700">LKR {totalRevenue.toFixed(2)}</div>
              </div>
            </div>

            <div className="bg-gray-50 rounded-xl p-4 mb-6">
              <h3 className="text-sm font-semibold text-gray-700 mb-3">Sales Chart</h3>
              <canvas ref={canvasRef} width="900" height="350" className="w-full" style={{maxHeight:350}}></canvas>
            </div>

            <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
              <table className="w-full">
                <thead>
                  <tr className="bg-gray-50 text-xs text-gray-600">
                    <th className="text-left px-4 py-3 font-semibold">Product Name</th>
                    <th className="text-left px-4 py-3 font-semibold">Quantity Sold</th>
                    <th className="text-left px-4 py-3 font-semibold">Total Revenue</th>
                  </tr>
                </thead>
                <tbody>
                  {productSalesData.map((product, idx) => (
                    <tr key={idx} className="border-t border-gray-100 hover:bg-gray-50">
                      <td className="px-4 py-3 text-sm font-medium text-gray-800">{product.productName}</td>
                      <td className="px-4 py-3 text-sm text-gray-600">{product.totalQtySold}</td>
                      <td className="px-4 py-3 text-sm font-semibold text-gray-800">LKR {product.totalRevenue.toFixed(2)}</td>
                    </tr>
                  ))}
                  <tr className="border-t-2 border-gray-300 bg-gray-50 font-bold">
                    <td className="px-4 py-3 text-sm text-gray-800">TOTAL</td>
                    <td className="px-4 py-3 text-sm text-gray-800">{totalProductsSold}</td>
                    <td className="px-4 py-3 text-sm text-gray-800">LKR {totalRevenue.toFixed(2)}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

              ))}
              <div className="border-t border-dashed border-gray-400 my-2" />
              {orderNote && orderNote.trim() && (
                <>
                  <div className="text-xs font-bold mt-1">Note:</div>
                  <div className="text-xs text-gray-600 italic mb-1">{orderNote}</div>
                  <div className="border-t border-dashed border-gray-400 my-2" />
                </>
              )}
              <div className="flex justify-between text-xs"><span>Subtotal</span><span>LKR {subtotal.toFixed(2)}</span></div>
              {discount>0 && <div className="flex justify-between text-xs text-emerald-700"><span>Discount ({discount}%)</span><span>-LKR {discountAmt.toFixed(2)}</span></div>}
              <div className="flex justify-between text-xs font-bold mt-1 pt-1 border-t border-gray-300"><span>TOTAL</span><span>LKR {total.toFixed(2)}</span></div>
              {trackingNum && <div className="flex justify-between text-xs text-blue-600 mt-0.5"><span>Tracking #</span><span style={{fontFamily:'monospace'}}>{trackingNum}</span></div>}
              <div className="flex justify-between text-xs text-gray-500 mt-0.5"><span>Method</span><span>{method}</span></div>
              {method==='Cash' && <div className="flex justify-between text-xs text-gray-500"><span>Change</span><span>LKR {change.toFixed(2)}</span></div>}
              <div className="border-t border-dashed border-gray-400 my-2" />
              <div className="text-center text-xs text-gray-500">{settings.footer}</div>
              <div className="text-center text-xs text-gray-400">✨ Glow with confidence ✨</div>
            </div>
            <div className="flex gap-3 mt-4">
              <button onClick={()=>{
                const content = document.getElementById('receipt-content').innerHTML;
                const w = window.open('','_blank','width=400,height=600');
                w.document.write(`<!DOCTYPE html><html><head><title>Receipt ${orderNum}</title><style>
                  body{margin:20px;font-family:'Courier New',monospace;font-size:12px;background:#fff;}
                  .flex{display:flex;}.justify-between{justify-content:space-between;}.text-xs{font-size:11px;}
                  .font-bold{font-weight:700;}.text-center{text-align:center;}.my-2{margin:8px 0;}
                  .border-t{border-top:1px solid #ccc;}.border-dashed{border-top-style:dashed;}
                  .text-gray-400{color:#9ca3af;}.text-gray-500{color:#6b7280;}.text-gray-600{color:#4b5563;}
                  .text-emerald-700{color:#047857;}.text-blue-600{color:#2563eb;}.italic{font-style:italic;}
                  .mt-1{margin-top:4px;}.mb-1{margin-bottom:4px;}.pt-1{padding-top:4px;}.py-0\\.5{padding:2px 0;}
                  .border-gray-300{border-top-color:#d1d5db;}.border-gray-400{border-top-color:#9ca3af;}
                </style></head><body>${content}</body></html>`);
                w.document.close();
                w.focus();
                setTimeout(()=>{ w.print(); w.close(); }, 400);
              }} className="flex-1 border border-indigo-300 text-indigo-600 py-2.5 rounded-xl text-sm font-medium hover:bg-indigo-50">🖨️ Print</button>
              <button onClick={()=>{ onConfirm(orderNum, method, selectedCustomer); onClose(); showToast('Payment confirmed!'); }}
                className="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700">✓ Done</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── POS SCREEN ──────────────────────────────────────────────────────────────
function POS({ showToast, settings, customers, setCustomers, orders, setOrders, products, setProducts,
               packages, setPackages,
               lastInvoiceNumber, setLastInvoiceNumber, trackingCounter, setTrackingCounter }) {
  const [cart, setCart] = useState([]);
  const [search, setSearch] = useState('');
  const [discount, setDiscount] = useState(0);
  const [showPayment, setShowPayment] = useState(false);
  const [posTab, setPosTab] = useState('products'); // 'products' | 'packages'

  // Customer search state
  const [custSearch, setCustSearch] = useState('');
  const [selectedCustomer, setSelectedCustomer] = useState(null);
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const custRef = useRef(null);

  // Order note
  const [orderNote, setOrderNote] = useState('');

  // Invoice number — always next = lastInvoiceNumber + 1, formatted with leading zeros
  const [editingInvoice, setEditingInvoice] = useState(false);
  const [customInvoice, setCustomInvoice] = useState('');
  const nextInvoiceNum = lastInvoiceNumber + 1;
  const autoInvoiceNum = `${settings.prefix}${String(nextInvoiceNum).padStart(4,'0')}`;
  const displayInvoice = customInvoice.trim() || autoInvoiceNum;

  // Tracking — computed from trackingCounter (pure integer in localStorage).
  // Display = "MC" + trackingCounter. 0 means not set yet.
  const TRACKING_PREFIX = 'MC';
  const trackingDisplay = trackingCounter > 0 ? `${TRACKING_PREFIX}${trackingCounter}` : '';
  const [editingTracking, setEditingTracking] = useState(false);
  const [trackingDraft, setTrackingDraft] = useState('');
  // Keep trackingDraft in sync whenever trackingCounter changes (page load, post-purchase, Settings update)
  useEffect(() => {
    setTrackingDraft(trackingCounter > 0 ? `${TRACKING_PREFIX}${trackingCounter}` : '');
    setEditingTracking(false);
  }, [trackingCounter]);

  const filteredProducts = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
  const filteredPackages = packages.filter(pk => pk.name.toLowerCase().includes(search.toLowerCase()));

  const custSuggestions = custSearch.length > 0
    ? customers.filter(c => c.name.toLowerCase().includes(custSearch.toLowerCase()) || c.phone.includes(custSearch)).slice(0, 6)
    : [];

  const selectCustomer = (c) => {
    setSelectedCustomer(c);
    setCustSearch(c.name);
    setShowSuggestions(false);
  };

  const addToCart = (product) => {
    setCart(prev => {
      const exists = prev.find(i=>i.type!=='package' && i.id===product.id);
      if (exists) return prev.map(i=>(!i.type||i.type!=='package')&&i.id===product.id?{...i,qty:i.qty+1}:i);
      return [...prev, {...product, type:'product', qty:1}];
    });
    showToast(`${product.name} added`);
  };

  const addPackageToCart = (pkg) => {
    const { available, status, reason } = calcPackageStatus(pkg, products);
    if (status !== 'available') {
      showToast(`Package unavailable — ${reason || 'low stock'}`);
      return;
    }
    const existingPkg = cart.find(i=>i.type==='package' && i.id===pkg.id);
    if (existingPkg) {
      setCart(prev=>prev.map(i=>i.type==='package'&&i.id===pkg.id?{...i,qty:Math.min(available,i.qty+1)}:i));
    } else {
      setCart(prev=>[...prev, {
        type: 'package',
        id: pkg.id,
        name: pkg.name,
        price: pkg.price,
        breakdown: pkg.breakdown,
        qty: 1
      }]);
    }
    showToast(`${pkg.name} added`);
  };

  // updateQty and removeItem use item.type + item.id as the key
  const updateQty = (item, delta) => {
    setCart(prev=>prev.map(i=>{
      if (i.type==='package' && item.type==='package' && i.id===item.id) {
        const { available, status } = calcPackageStatus(i, products);
        // Prevent increasing qty if package is not available
        if (delta > 0 && status !== 'available') return i;
        return { ...i, qty: Math.min(available, Math.max(1, i.qty+delta)) };
      }
      if (i.type!=='package' && item.type!=='package' && i.id===item.id) return {...i, qty:Math.max(1,i.qty+delta)};
      return i;
    }));
  };
  const removeItem = (item) => setCart(prev=>prev.filter(i=>!(i.type===item.type && i.id===item.id)));
  const clearCart = () => {
    setCart([]); setDiscount(0); setSelectedCustomer(null); setCustSearch('');
    setOrderNote(''); setCustomInvoice(''); setEditingInvoice(false);
    // Tracking field is NOT touched — useEffect watching trackingCounter keeps it current
  };

  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty, 0);
  const discountAmt = subtotal*(discount/100);
  const total = subtotal - discountAmt;

  const handleAddNewCustomer = (form) => {
    // Normalize phone number and check for duplicates
    const normalizedPhone = form.phone.trim();
    const existingCustomer = customers.find(c => c.phone.trim() === normalizedPhone);

    if (existingCustomer) {
      alert(`Customer with this phone number already exists.\n\nName: ${existingCustomer.name}\nPhone: ${existingCustomer.phone}\nAddress: ${existingCustomer.address || 'N/A'}\n\nSelecting existing customer instead.`);
      selectCustomer(existingCustomer);
      setShowQuickAdd(false);
      showToast(`${existingCustomer.name} selected!`);
      return;
    }

    const newC = {
      ...form, id: Date.now(), orders:0, spent:0,
      initials: form.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),
      color:'#4f46e5'
    };
    setCustomers(prev=>[...prev, newC]);
    selectCustomer(newC);
    setShowQuickAdd(false);
    showToast(`${form.name} registered & selected!`);
  };

  const handlePaymentConfirm = (orderNum, method, cust) => {
    // The tracking value saved on the order is the current display value
    const usedTracking = trackingCounter > 0 ? `${TRACKING_PREFIX}${trackingCounter}` : trackingDraft.trim();

    // Build itemsList — regular products and packages stored with type info
    const itemsList = cart.map(i => {
      if (i.type === 'package') {
        return { type:'package', packageId:i.id, name:i.name, price:i.price, qty:i.qty, breakdown:i.breakdown };
      }
      return { name:i.name, qty:i.qty, price:i.price };
    });

    const now = new Date();
    const newOrder = {
      id: orderNum,
      customerId: cust?.id || null,
      customer: cust?.name || 'Walk-in',
      phone: cust?.phone || '',
      address: cust?.address || '',
      items: cart.map(i=>`${i.name}${i.qty>1?' x'+i.qty:''}`).join(', '),
      itemsList,
      note: orderNote.trim(),
      tracking: usedTracking,
      amount: total,
      method,
      status: 'Paid',
      date: now.toISOString().split('T')[0],
      time: now.toTimeString().slice(0, 8), // HH:MM:SS format
      timestamp: now.toISOString()
    };
    setOrders(prev=>[newOrder, ...prev]);

    // Invoice: save the used number so next = usedNum + 1
    const usedInvoiceNum = customInvoice.trim()
      ? parseInt(customInvoice.trim().replace(/\D/g,''), 10) || nextInvoiceNum
      : nextInvoiceNum;
    setLastInvoiceNumber(usedInvoiceNum);

    // Tracking: increment counter by 1 and persist.
    if (trackingCounter > 0) {
      setTrackingCounter(trackingCounter + 1);
    }

    // Deduct stock: regular products directly; packages deduct each component product
    setProducts(prev => {
      let updated = [...prev];
      for (const cartItem of cart) {
        if (cartItem.type === 'package') {
          // Deduct each component product: qtyRequired × package qty
          for (const b of cartItem.breakdown) {
            updated = updated.map(p =>
              p.id === b.productId
                ? { ...p, stock: Math.max(0, p.stock - b.qtyRequired * cartItem.qty) }
                : p
            );
          }
        } else {
          // Regular product
          updated = updated.map(p =>
            p.id === cartItem.id
              ? { ...p, stock: Math.max(0, p.stock - cartItem.qty) }
              : p
          );
        }
      }
      return updated;
    });

    // Update customer orders count and spent
    if (cust) {
      setCustomers(prev => prev.map(c => c.id === cust.id ? { ...c, orders: (c.orders||0)+1, spent: (c.spent||0)+total } : c));
    }
    clearCart();
  };

  return (
    <div className="flex h-full">
      {/* Product Area */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="bg-white border-b border-gray-100 px-5 py-3.5">
          <div className="flex items-center gap-3">
            <div>
              <div className="font-bold text-gray-800 text-sm">{settings.name}</div>
              <div className="text-xs text-gray-400">{settings.tagline}</div>
            </div>
            <div className="flex-1 relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)}
                placeholder="Scan barcode or type to search product..."
                className="w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
              <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer" title="Scan barcode">📷</span>
            </div>
            <span className="text-xs bg-indigo-50 text-indigo-600 px-3 py-2 rounded-xl font-medium">{orders.length} orders</span>
          </div>
          {/* Tabs */}
          <div className="flex gap-2 mt-3">
            <button onClick={()=>setPosTab('products')}
              className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors ${posTab==='products'?'bg-indigo-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              🛍️ Products
            </button>
            <button onClick={()=>setPosTab('packages')}
              className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors ${posTab==='packages'?'bg-emerald-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              📦 Packages {packages.length > 0 && <span className="ml-1 bg-white/30 px-1.5 rounded-full">{packages.length}</span>}
            </button>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto p-5">
          {posTab === 'products' ? (
            filteredProducts.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full text-gray-400">
                <div className="text-5xl mb-3">🔍</div>
                <p className="text-sm">No products found for "{search}"</p>
              </div>
            ) : (
              <div className="grid gap-4" style={{ gridTemplateColumns:'repeat(auto-fill, minmax(145px, 1fr))' }}>
                {filteredProducts.map(p => (
                  <div key={p.id} className="product-card bg-white rounded-2xl p-4 shadow-sm text-center border border-transparent hover:border-indigo-100" onClick={()=>addToCart(p)}>
                    <div className="w-16 h-16 rounded-2xl mx-auto mb-3 flex items-center justify-center text-3xl" style={{ background:p.color }}>{p.emoji}</div>
                    <div className="text-sm font-semibold text-gray-800 leading-tight">{p.name}</div>
                    <div className="text-indigo-600 font-bold mt-1 text-sm">LKR {p.price.toFixed(2)}</div>
                    {p.stock <= (p.alertAt??10) && <div className="text-xs bg-red-100 text-red-600 rounded-full px-2 py-0.5 mt-1 inline-block">Low: {p.stock}</div>}
                  </div>
                ))}
              </div>
            )
          ) : (
            filteredPackages.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-full text-gray-400">
                <div className="text-5xl mb-3">📦</div>
                <p className="text-sm">{search ? `No packages found for "${search}"` : 'No packages created yet'}</p>
                {!search && <p className="text-xs mt-1">Go to Products page to create packages</p>}
              </div>
            ) : (
              <div className="grid gap-4" style={{ gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))' }}>
                {filteredPackages.map(pkg => {
                  const pkgSt = calcPackageStatus(pkg, products);
                  const { available, status, reason } = pkgSt;
                  const isDisabled = status !== 'available';
                  const cardBorder = status==='available'?'border-transparent hover:border-emerald-100':status==='low_stock'?'border-amber-200':'border-red-200';
                  const iconBg = status==='available'?'bg-emerald-100':status==='low_stock'?'bg-amber-100':'bg-red-100';
                  const statusLabel = status==='available'
                    ? `${available} available`
                    : status==='low_stock'
                      ? 'Unavailable — Low Stock'
                      : 'Out of Stock';
                  const statusClass = status==='available'
                    ? 'bg-emerald-100 text-emerald-700'
                    : status==='low_stock'
                      ? 'bg-amber-100 text-amber-700'
                      : 'bg-red-100 text-red-700';
                  return (
                    <div key={pkg.id}
                      title={reason||''}
                      className={`bg-white rounded-2xl p-4 shadow-sm border transition-all ${cardBorder} ${isDisabled?'opacity-60 cursor-not-allowed':'product-card cursor-pointer'}`}
                      onClick={()=>!isDisabled && addPackageToCart(pkg)}>
                      <div className={`w-16 h-16 rounded-2xl mx-auto mb-3 flex items-center justify-center text-3xl ${iconBg}`}>📦</div>
                      <div className={`text-sm font-semibold leading-tight text-center ${isDisabled?'text-gray-400':'text-gray-800'}`}>{pkg.name}</div>
                      <div className={`font-bold mt-1 text-sm text-center ${isDisabled?'text-gray-400':'text-emerald-600'}`}>LKR {parseFloat(pkg.price).toFixed(2)}</div>
                      <div className="mt-2 space-y-0.5">
                        {pkg.breakdown.map((b,bi)=>{
                          const pr = products.find(p=>p.id===b.productId);
                          return <div key={bi} className="text-xs text-gray-400 text-center">{pr?`${pr.emoji} ${pr.name}`:''} ×{b.qtyRequired}</div>;
                        })}
                      </div>
                      <div className={`text-xs rounded-full px-2 py-0.5 mt-2 text-center font-medium ${statusClass}`}>
                        {statusLabel}
                      </div>
                      {isDisabled && (
                        <div className="text-xs text-center mt-1.5 text-gray-400 leading-tight">
                          Package unavailable due to low stock
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )
          )}
        </div>
      </div>

      {/* Cart Panel */}
      <div className="w-80 bg-white border-l border-gray-100 flex flex-col shadow-md">
        <div className="px-4 py-3.5 border-b border-gray-100">
          <h2 className="font-bold text-gray-800 mb-2">🛒 Cart</h2>

          {/* Customer Search */}
          <div className="relative" ref={custRef}>
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">👤</span>
              <input
                value={custSearch}
                onChange={e=>{ setCustSearch(e.target.value); setShowSuggestions(true); if(!e.target.value) setSelectedCustomer(null); }}
                onFocus={()=>setShowSuggestions(true)}
                placeholder="Search or select customer..."
                className="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"
              />
              {selectedCustomer && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-emerald-500 text-sm">✓</span>}
            </div>
            {showSuggestions && custSearch.length > 0 && (
              <div className="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 overflow-hidden">
                {custSuggestions.length > 0 ? custSuggestions.map(c=>(
                  <div key={c.id} className="customer-suggestion flex items-center gap-2" onClick={()=>selectCustomer(c)}>
                    <div className="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:c.color}}>{c.initials}</div>
                    <div>
                      <div className="font-medium text-gray-800">{c.name}</div>
                      <div className="text-xs text-gray-400">{c.phone}</div>
                    </div>
                  </div>
                )) : (
                  <div className="p-3">
                    <div className="text-xs text-gray-500 mb-2">No customer found for "{custSearch}"</div>
                    <button onClick={()=>{ setShowSuggestions(false); setShowQuickAdd(true); }}
                      className="w-full text-xs bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700">
                      + Add New Customer
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>

          {selectedCustomer && (
            <div className="mt-2 bg-indigo-50 rounded-lg px-3 py-2 flex items-center justify-between">
              <div>
                <div className="text-xs font-semibold text-indigo-800">{selectedCustomer.name}</div>
                <div className="text-xs text-indigo-500">{selectedCustomer.phone}</div>
              </div>
              <button onClick={()=>{ setSelectedCustomer(null); setCustSearch(''); }} className="text-indigo-400 hover:text-indigo-600 text-lg leading-none">&times;</button>
            </div>
          )}
        </div>

        <div className="flex-1 overflow-y-auto px-4 py-3">
          {cart.length === 0 ? (
            <div className="flex flex-col items-center justify-center h-full text-gray-400 py-10">
              <div className="text-5xl mb-3">🛒</div>
              <p className="text-sm text-center">Cart is empty.<br/>Click a product to add.</p>
            </div>
          ) : (
            <div className="space-y-2">
              {cart.map((item, idx)=>(
                <div key={`${item.type||'product'}-${item.id}`} className={`rounded-xl p-3 ${item.type==='package'?'bg-emerald-50 border border-emerald-100':'bg-gray-50'}`}>
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <div className="flex items-center gap-2">
                      <span className="text-lg">{item.type==='package'?'📦':(item.emoji||'')}</span>
                      <div>
                        <div className="text-xs font-semibold text-gray-800">{item.name}</div>
                        {item.type==='package' && (
                          <div className="text-xs text-emerald-500 font-medium">Package</div>
                        )}
                        <div className={`text-xs font-bold ${item.type==='package'?'text-emerald-600':'text-indigo-600'}`}>LKR {parseFloat(item.price).toFixed(2)}</div>
                      </div>
                    </div>
                    <button onClick={()=>removeItem(item)} className="text-red-400 hover:text-red-600 text-sm leading-none">&times;</button>
                  </div>
                  {/* Package breakdown — non-editable list */}
                  {item.type==='package' && (
                    <div className="mb-2 pl-6 space-y-0.5">
                      {item.breakdown.map((b,bi)=>{
                        const pr = products.find(p=>p.id===b.productId);
                        return <div key={bi} className="text-xs text-emerald-600">· {pr?`${pr.emoji} ${pr.name}`:''} ×{b.qtyRequired}</div>;
                      })}
                    </div>
                  )}
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-1.5">
                      <div className={`qty-btn ${item.type==='package'?'bg-emerald-100 hover:bg-emerald-200 text-emerald-700':'bg-gray-200 hover:bg-gray-300 text-gray-700'}`} onClick={()=>updateQty(item,-1)}>-</div>
                      <span className="text-sm font-bold w-6 text-center">{item.qty}</span>
                      <div className={`qty-btn ${item.type==='package'?'bg-emerald-200 hover:bg-emerald-300 text-emerald-800':'bg-indigo-100 hover:bg-indigo-200 text-indigo-700'}`} onClick={()=>updateQty(item,1)}>+</div>
                    </div>
                    <div className="text-sm font-bold text-gray-800">LKR {(parseFloat(item.price)*item.qty).toFixed(2)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="px-4 py-3.5 border-t border-gray-100 space-y-2">
          {/* Invoice Number Row */}
          <div className="bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-2">
            {editingInvoice ? (
              <div>
                <label className="block text-xs font-semibold text-indigo-600 mb-1">✏️ Invoice Number</label>
                <div className="flex gap-2">
                  <input
                    autoFocus
                    value={customInvoice}
                    onChange={e=>setCustomInvoice(e.target.value)}
                    placeholder={autoInvoiceNum}
                    className="flex-1 border border-indigo-300 rounded-lg px-2 py-1.5 text-sm font-mono font-bold text-indigo-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 bg-white"
                  />
                  <button onClick={()=>setEditingInvoice(false)}
                    className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-semibold hover:bg-indigo-700">
                    Set
                  </button>
                  <button onClick={()=>{ setCustomInvoice(''); setEditingInvoice(false); }}

// ─── CUSTOMERS ───────────────────────────────────────────────────────────────
function Customers({ showToast, customers, setCustomers, orders }) {
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [reportCustomer, setReportCustomer] = useState(null);

  // Search by name, phone, invoice number, or tracking number
  const filtered = customers.filter(c => {
    const q = search.toLowerCase();
    if (!q) return true;
    if (c.name.toLowerCase().includes(q)) return true;
    if (c.phone.includes(q)) return true;
    // Search orders for this customer by invoice or tracking
    const custOrders = orders.filter(o => o.customerId === c.id);
    return custOrders.some(o =>
      o.id.toLowerCase().includes(q) ||
      (o.tracking && o.tracking.toLowerCase().includes(q))
    );
  });

  // Get latest invoice for each customer
  const getLatestInvoice = (customerId) => {
    const custOrders = orders.filter(o => o.customerId === customerId).sort((a,b)=>b.date.localeCompare(a.date));
    return custOrders[0]?.id || null;
  };

  const saveCustomer = (form) => {
    // Normalize phone number
    const normalizedPhone = form.phone.trim();

    if (modal==='add') {
      // Check for duplicate phone number
      const existingCustomer = customers.find(c => c.phone.trim() === normalizedPhone);
      if (existingCustomer) {
        alert(`Customer with this phone number already exists.\n\nName: ${existingCustomer.name}\nPhone: ${existingCustomer.phone}\nAddress: ${existingCustomer.address || 'N/A'}\n\nPlease edit the existing customer instead.`);
        return;
      }
      setCustomers(prev=>[...prev,{...form,id:Date.now(),orders:0,spent:0,
        initials:form.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2),color:'#4f46e5'}]);
      showToast('Customer added!');
    } else {
      // Check for duplicate phone number (excluding current customer)
      const existingCustomer = customers.find(c => c.id !== modal.id && c.phone.trim() === normalizedPhone);
      if (existingCustomer) {
        alert(`Another customer with this phone number already exists.\n\nName: ${existingCustomer.name}\nPhone: ${existingCustomer.phone}\nAddress: ${existingCustomer.address || 'N/A'}`);
        return;
      }
      setCustomers(prev=>prev.map(c=>c.id===modal.id?{...c,...form}:c));
      showToast('Customer updated!');
    }
  };

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Customers</h1>
          <p className="text-gray-500 text-sm mt-0.5">{customers.length} registered customers</p>
        </div>
        <button onClick={()=>setModal('add')} className="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-indigo-700">+ Add Customer</button>
      </div>
      <div className="bg-white rounded-2xl shadow-sm">
        <div className="p-4 border-b border-gray-100">
          <div className="relative">
            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, phone, invoice # or tracking #..."
              className="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
          </div>
          {search && <p className="text-xs text-gray-400 mt-1.5 ml-1">Searching name, phone, invoice number, and tracking number — {filtered.length} found</p>}
        </div>
        <table className="w-full">
          <thead>
            <tr className="text-xs text-gray-500 bg-gray-50">
              {['Customer','Phone','Address','Latest Invoice','Orders','Spent','Actions'].map(h=>(
                <th key={h} className="text-left px-5 py-3 font-medium">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(c=>{
              const latestInv = getLatestInvoice(c.id);
              const realOrders = orders.filter(o=>o.customerId===c.id).length;
              const realSpent = orders.filter(o=>o.customerId===c.id).reduce((s,o)=>s+o.amount,0);
              return (
              <tr key={c.id} onClick={()=>setReportCustomer(c)} className="table-row border-t border-gray-50 cursor-pointer hover:bg-purple-50 transition-colors">
                <td className="px-5 py-3.5">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:c.color}}>{c.initials}</div>
                    <span className="text-sm font-medium text-gray-800">{c.name}</span>
                  </div>
                </td>
                <td className="px-5 py-3.5 text-sm text-gray-600">{c.phone}</td>
                <td className="px-5 py-3.5 text-sm text-gray-500 max-w-32 truncate">{c.address}</td>
                <td className="px-5 py-3.5">
                  {latestInv ? <span className="text-xs font-mono bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">{latestInv}</span> : <span className="text-xs text-gray-300">—</span>}
                </td>
                <td className="px-5 py-3.5 text-sm text-center"><span className="bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full text-xs font-medium">{realOrders || c.orders}</span></td>
                <td className="px-5 py-3.5 text-sm font-semibold text-gray-800">LKR {(realOrders ? realSpent : c.spent||0).toFixed(2)}</td>
                <td className="px-5 py-3.5" onClick={e=>e.stopPropagation()}>
                  <div className="flex gap-2">
                    <button onClick={()=>setReportCustomer(c)} className="text-xs bg-purple-50 text-purple-600 px-2.5 py-1 rounded-lg hover:bg-purple-100 font-medium">📋 Report</button>
                    <button onClick={()=>setModal(c)} className="text-xs bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg hover:bg-indigo-100">Edit</button>
                    <button onClick={()=>{setCustomers(prev=>prev.filter(x=>x.id!==c.id));showToast('Deleted.');}} className="text-xs bg-red-50 text-red-600 px-2.5 py-1 rounded-lg hover:bg-red-100">Delete</button>
                  </div>
                </td>
              </tr>
            );})}
          </tbody>
        </table>
        {filtered.length===0 && <div className="text-center py-12 text-gray-400"><div className="text-4xl mb-2">👥</div><p className="text-sm">No customers found</p></div>}
      </div>
      {modal && <CustomerModal customer={modal==='add'?null:modal} onSave={saveCustomer} onClose={()=>setModal(null)} />}
      {reportCustomer && <CustomerReportModal customer={reportCustomer} orders={orders} onClose={()=>setReportCustomer(null)} />}
    </div>
  );
}

// ─── PACKAGE STATUS HELPER ───────────────────────────────────────────────────
// Returns { available: number, status: 'available'|'low_stock'|'out_of_stock', reason: string }
// Status rules:
//   out_of_stock  — any product has stock < qtyRequired (zero-stock rule)
//   low_stock     — any product's post-sale stock would drop below its minStock threshold
//   available     — all constraints satisfied
function calcPackageStatus(pkg, products) {
  if (!pkg.breakdown || pkg.breakdown.length === 0) {
    return { available: 0, status: 'out_of_stock', reason: 'No products defined' };
  }

  let minAvail = Infinity;
  let outOfStockReason = null;
  let lowStockReason = null;

  for (const item of pkg.breakdown) {
    const prod = products.find(p => p.id === item.productId);
    if (!prod) {
      return { available: 0, status: 'out_of_stock', reason: 'Product no longer exists' };
    }

    // Zero-stock rule: product stock must cover at least one package
    if (prod.stock < item.qtyRequired) {
      outOfStockReason = `${prod.name} — insufficient stock (${prod.stock} < ${item.qtyRequired} required)`;
    }

    // Min-stock threshold rule: after selling 1 package, remaining stock must stay >= minStock
    const minStock = prod.minStock ?? 0;
    const stockAfterOneSale = prod.stock - item.qtyRequired;
    if (stockAfterOneSale < minStock) {
      lowStockReason = lowStockReason || `${prod.name} — would drop below minimum (${minStock})`;
    }

    const canMake = Math.floor(prod.stock / item.qtyRequired);
    if (canMake < minAvail) minAvail = canMake;
  }

  const available = minAvail === Infinity ? 0 : minAvail;

  if (outOfStockReason) {
    return { available: 0, status: 'out_of_stock', reason: outOfStockReason };
  }
  if (lowStockReason) {
    // Still show available count but mark as low_stock (disabled for sale)
    return { available, status: 'low_stock', reason: lowStockReason };
  }
  return { available, status: 'available', reason: '' };
}

// Backwards-compat shim — callers that only need the count
function calcPackageStock(pkg, products) {
  return calcPackageStatus(pkg, products).available;
}

// ─── PACKAGE MODAL ────────────────────────────────────────────────────────────
function PackageModal({ pkg, products, onSave, onClose }) {
  const [name, setName] = useState(pkg?.name || '');
  const [price, setPrice] = useState(pkg?.price ? String(pkg.price) : '');
  const [breakdown, setBreakdown] = useState(
    pkg?.breakdown ? pkg.breakdown.map(b => ({...b})) : [{ productId: products[0]?.id || '', qtyRequired: 1 }]
  );

  const addRow = () => setBreakdown(prev => [...prev, { productId: products[0]?.id || '', qtyRequired: 1 }]);
  const removeRow = (idx) => setBreakdown(prev => prev.filter((_,i) => i !== idx));
  const setRow = (idx, key, val) => setBreakdown(prev => prev.map((r,i) => i === idx ? {...r, [key]: val} : r));

  const previewStatus = () => calcPackageStatus({ breakdown }, products);

  const handleSave = () => {
    if (!name.trim()) { alert('Package name is required.'); return; }
    const priceNum = parseFloat(price);
    if (isNaN(priceNum) || priceNum <= 0) { alert('Enter a valid price.'); return; }
    if (breakdown.length === 0) { alert('Add at least one product to the package.'); return; }
    for (const r of breakdown) {
      if (!r.productId) { alert('Select a product for each row.'); return; }
      if (!r.qtyRequired || r.qtyRequired < 1) { alert('Quantity must be at least 1.'); return; }
    }
    // De-duplicate: if same productId appears twice, merge their quantities
    const merged = [];
    for (const r of breakdown) {
      const existing = merged.find(m => m.productId === r.productId);
      if (existing) { existing.qtyRequired += Number(r.qtyRequired); }
      else { merged.push({ productId: r.productId, qtyRequired: Number(r.qtyRequired) }); }
    }
    onSave({
      name: name.trim(),
      price: priceNum,
      breakdown: merged
    });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'white',borderRadius:20,padding:28,width:560,maxHeight:'90vh',overflowY:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.2)'}}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-lg font-bold text-gray-800">{pkg ? 'Edit Package' : 'Create Package'}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Package Name</label>
              <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Arabic Beauty Combo"
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-600 mb-1.5">Package Price (LKR)</label>
              <input type="number" min="0" value={price} onChange={e=>setPrice(e.target.value)} placeholder="e.g. 17500"
                className="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
            </div>
          </div>

          <div>
            <div className="flex items-center justify-between mb-2">
              <label className="text-xs font-semibold text-gray-600">Products in Package (Fixed, non-editable at sale)</label>
              <button onClick={addRow} className="text-xs bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg hover:bg-indigo-100 font-medium">+ Add Product</button>
            </div>
            <div className="space-y-2">
              {breakdown.map((row, idx) => {
                const selProd = products.find(p => String(p.id) === String(row.productId));
                return (
                  <div key={idx} className="flex items-center gap-2 bg-gray-50 rounded-xl p-2.5">
                    <select value={row.productId} onChange={e=>setRow(idx,'productId', parseInt(e.target.value))}
                      className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:border-indigo-400">
                      {products.map(p=>(
                        <option key={p.id} value={p.id}>{p.emoji} {p.name} (stock: {p.stock})</option>
                      ))}
                    </select>
                    <div className="flex items-center gap-1.5 flex-shrink-0">
                      <span className="text-xs text-gray-500">Qty:</span>
                      <input type="number" min="1" value={row.qtyRequired}
                        onChange={e=>setRow(idx,'qtyRequired',parseInt(e.target.value)||1)}
                        className="w-16 border border-gray-200 rounded-lg px-2 py-2 text-sm text-center focus:border-indigo-400" />
                    </div>
                    {breakdown.length > 1 && (
                      <button onClick={()=>removeRow(idx)} className="text-red-400 hover:text-red-600 text-lg leading-none px-1">&times;</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Live stock preview */}
          {(() => {
            const { available, status, reason } = previewStatus();
            const cfg = {
              available:    { bg:'bg-emerald-50', border:'border-emerald-100', icon:'✅', titleCls:'text-emerald-600', valCls:'text-emerald-700', subCls:'text-emerald-500' },
              low_stock:    { bg:'bg-amber-50',   border:'border-amber-200',   icon:'⚠️', titleCls:'text-amber-700',  valCls:'text-amber-800',  subCls:'text-amber-600' },
              out_of_stock: { bg:'bg-red-50',     border:'border-red-200',     icon:'🚫', titleCls:'text-red-600',    valCls:'text-red-700',    subCls:'text-red-500' },
            }[status];
            return (
              <div className={`${cfg.bg} border ${cfg.border} rounded-xl p-3 flex items-center gap-3`}>
                <span className="text-xl">{cfg.icon}</span>
                <div className="flex-1">
                  <div className={`text-xs font-medium ${cfg.titleCls}`}>Package Status (auto-calculated)</div>
                  <div className={`text-lg font-bold ${cfg.valCls}`}>{available} packages available</div>
                  {reason
                    ? <div className={`text-xs mt-0.5 ${cfg.subCls}`}>{reason}</div>
                    : <div className={`text-xs mt-0.5 ${cfg.subCls}`}>All product minimums satisfied</div>
                  }
                </div>
              </div>
            );
          })()}
        </div>

        <div className="flex gap-3 mt-6">
          <button onClick={onClose} className="flex-1 border border-gray-200 text-gray-600 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-50">Cancel</button>
          <button onClick={handleSave} className="flex-1 bg-indigo-600 text-white py-2.5 rounded-xl text-sm font-semibold hover:bg-indigo-700">Save Package</button>
        </div>
      </div>
    </div>
  );
}

// ─── EXPORT HELPERS ──────────────────────────────────────────────────────────
// Build a human-readable items string that includes package breakdown
function buildItemsExportStr(o) {
  if (!o.itemsList || o.itemsList.length === 0) return o.items || '';
  return o.itemsList.map(item => {
    if (item.type === 'package' && item.breakdown) {
      const bdStr = item.breakdown.map(b=>`${b.qtyRequired}×[ProductID:${b.productId}]`).join(', ');
      return `[PKG] ${item.name} x${item.qty} (${bdStr})`;
    }
    return `${item.name} x${item.qty}`;
  }).join('; ');
}

function exportToExcel(orders, customers, settings, filename) {
  const XLSX = window.XLSX;
  if (!XLSX) { alert('Excel library not loaded. Please try again.'); return; }

  // Sheet 1 – Sales Invoices (with full customer details)
  const salesRows = [
    [`${settings.name} — Sales Invoice Report`],
    ['Generated:', new Date().toLocaleString()],
    ['Period:', filename.includes('daily')?'Daily':filename.includes('monthly')?'Monthly':'Custom Range'],
    [],
    ['Invoice #','Customer Name','Phone','Address','Items Purchased','Note','Tracking Number','Payment Method','Amount (LKR)','Date','Status'],
    ...orders.map(o => [
      o.id,
      o.customer,
      o.phone || '',
      o.address || '',
      buildItemsExportStr(o),
      o.note || '',
      o.tracking || '',
      o.method,
      o.amount,
      o.date,
      o.status
    ]),
    [],
    ['','','','','','','','TOTAL', orders.reduce((s,o)=>s+o.amount,0).toFixed(2),'',''],
  ];

  // Sheet 2 – Customer Details
  const custRows = [
    ['Name','Phone','Address','Total Orders','Total Spent (LKR)'],
    ...customers.map(c=>[c.name,c.phone,c.address,c.orders,c.spent||0]),
  ];

  // Sheet 3 – Products
  const productRows = [
    ['Product Name','Category','Price (LKR)','Stock','Status'],
    ...INITIAL_PRODUCTS.map(p=>[p.name,p.category,p.price,p.stock,p.stock===0?'Out of Stock':p.stock<10?'Low Stock':'In Stock']),
  ];

  // Sheet 4 – P&L
  const plRows = [
    [`${settings.name} — Profit & Loss`],
    ['Period: February 2026'],
    [],
    ['Category','Amount (LKR)','vs Last Month'],
    ['Revenue', orders.reduce((s,o)=>s+o.amount,0).toFixed(2), '+12.4%'],
    ['Expenses & COGS', (orders.reduce((s,o)=>s+o.amount,0)*0.67).toFixed(2), '-3.1%'],
    ['Net Profit', (orders.reduce((s,o)=>s+o.amount,0)*0.33).toFixed(2), '+18.9%'],
  ];

  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.aoa_to_sheet(salesRows);
  ws1['!cols']=[{wch:12},{wch:20},{wch:18},{wch:28},{wch:35},{wch:30},{wch:16},{wch:16},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Sales Invoices');

  const ws2 = XLSX.utils.aoa_to_sheet(custRows);
  ws2['!cols']=[{wch:20},{wch:18},{wch:28},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Customers');

  const ws3 = XLSX.utils.aoa_to_sheet(productRows);
  ws3['!cols']=[{wch:20},{wch:14},{wch:10},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Products');

  const ws4 = XLSX.utils.aoa_to_sheet(plRows);
  ws4['!cols']=[{wch:22},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws4, 'P&L Summary');

  XLSX.writeFile(wb, filename);
}

function exportToCSV(orders, filename) {
  const header = ['Invoice #','Customer Name','Phone','Address','Items','Note','Tracking Number','Payment Method','Amount (LKR)','Date','Status'];

// PART 1: City extraction — export-only, never stored.
// City = last word of the address field, trailing comma stripped.
function extractCity(address) {
  if (!address || !address.trim()) return '';
  const words = address.trim().split(/\s+/);
  const last = words[words.length - 1];
  return last.replace(/,+$/, '');
}

// PART 3: Build the Content column string.
// Package  → "Package Name (Product1 xQty, Product2 xQty)"
// Multiple → "Product1 xQty, Product2 xQty"
// Single   → "Product1 xQty"
// Falls back to o.items if itemsList is absent.
function buildContentStr(o, products) {
  const list = o.itemsList;
  if (!list || list.length === 0) return o.items || '';

  return list.map(item => {
    if (item.type === 'package' && item.breakdown && item.breakdown.length > 0) {
      // Build breakdown string using stored product names from itemsList OR look up by id
      const parts = item.breakdown.map(b => {
        // Try to find current product name; fall back to productId label
        const prod = Array.isArray(products) ? products.find(p => p.id === b.productId) : null;
        const pName = prod ? prod.name : `Product ${b.productId}`;
        return `${pName} x${b.qtyRequired * item.qty}`;
      });
      return `${item.name} (${parts.join(', ')})`;
    }
    return `${item.name} x${item.qty}`;
  }).join(', ');
}

// PART 2 + 4: Generate the courier Excel export.
// Columns (in order): Tracking Number, Receiver Name, Receiver Address,
//   Receiver City, Telephone, Sender Name, Remarks, Content, Ref Number
function exportToCourierExcel(orders, settings, filename, products) {
  const XLSX = window.XLSX;
  if (!XLSX) { alert('Excel library not loaded. Please try again.'); return; }

  const SENDER = 'Glow By Maheshi';
  const REMARKS = 'Whatsapp 0772524226 / 0770040283 / 0770039261 / 0776286380';

  const header = [
    'Tracking Number',
    'Receiver Name',
    'Receiver Address',
    'Receiver City',
    'Telephone',
    'Sender Name',
    'Remarks',
    'Content',
    'Ref Number',
  ];

  const rows = orders.map(o => [
    o.tracking || '',
    o.customer || '',
    (o.address || '').trim(),
    extractCity(o.address),
    o.phone || '',
    SENDER,
    REMARKS,
    buildContentStr(o, products),
    o.id || '',
  ]);

  const sheetData = [header, ...rows];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(sheetData);

  // Column widths for readability
  ws['!cols'] = [
    { wch: 18 }, // Tracking Number
    { wch: 22 }, // Receiver Name
    { wch: 35 }, // Receiver Address
    { wch: 16 }, // Receiver City
    { wch: 18 }, // Telephone
    { wch: 20 }, // Sender Name
    { wch: 55 }, // Remarks
    { wch: 45 }, // Content
    { wch: 14 }, // Ref Number
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Courier Export');
  XLSX.writeFile(wb, filename);
}
